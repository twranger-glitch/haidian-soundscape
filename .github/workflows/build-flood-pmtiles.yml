name: Build Flood PMTiles

on:
  workflow_dispatch:
    inputs:
      flood_file:
        description: "選擇要轉成 PMTiles 的淹水 GeoJSON，或選 ALL 一次轉全部"
        required: true
        type: choice
        options:
          - ALL
          - Flood_150mm_6HR.json
          - Flood_200mm_12HR.json
          - Flood_200mm_24HR.json
          - Flood_250mm_6HR.json
          - Flood_300mm_12HR.json
          - Flood_350mm_24HR.json
          - Flood_350mm_6HR.json
          - Flood_400mm_12HR.json
          - Flood_500mm_24HR.json
          - Flood_650mm_24HR.json

env:
  HF_BASE_URL: https://huggingface.co/datasets/yhzkiki/haidian-soundscape-gis/resolve/main/data/gis/flood
  MIN_ZOOM: "7"
  MAX_ZOOM: "17"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-pmtiles:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Prepare file list
        id: names
        shell: bash
        run: |
          SELECTED="${{ inputs.flood_file }}"

          if [ "$SELECTED" = "ALL" ]; then
            cat > files.txt <<'EOF'
          Flood_150mm_6HR.json
          Flood_200mm_12HR.json
          Flood_200mm_24HR.json
          Flood_250mm_6HR.json
          Flood_300mm_12HR.json
          Flood_350mm_24HR.json
          Flood_350mm_6HR.json
          Flood_400mm_12HR.json
          Flood_500mm_24HR.json
          Flood_650mm_24HR.json
          EOF
          else
            echo "$SELECTED" > files.txt
          fi

          echo "Files to process:"
          cat files.txt

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            libsqlite3-dev \
            zlib1g-dev \
            wget \
            golang-go \
            python3

      - name: Build and install Tippecanoe
        run: |
          git clone https://github.com/mapbox/tippecanoe.git
          cd tippecanoe
          make -j"$(nproc)"
          sudo make install
          tippecanoe --version

      - name: Convert selected GeoJSON files to PMTiles
        shell: bash
        run: |
          mkdir -p input output

          while read -r FILE; do
            [ -z "$FILE" ] && continue

            BASENAME="${FILE%.json}"
            MBTILES="output/${BASENAME}.mbtiles"
            PMTILES="output/${BASENAME}_v2.pmtiles"

            echo "===================================================="
            echo "Processing: $FILE"
            echo "Output: ${BASENAME}_v2.pmtiles"
            echo "===================================================="

            wget \
              -O "input/$FILE" \
              "${HF_BASE_URL}/${FILE}"

            echo "Downloaded:"
            ls -lh "input/$FILE"

            python3 - <<PY
          import json
          from pathlib import Path

          p = Path("input/$FILE")
          print("Source size:", p.stat().st_size, "bytes")

          with p.open("r", encoding="utf-8") as f:
              data = json.load(f)

          print("GeoJSON type:", data.get("type"))
          print("Feature count:", len(data.get("features", [])))

          if data.get("type") != "FeatureCollection":
              raise SystemExit("Source is not a GeoJSON FeatureCollection")
          PY

            tippecanoe \
              -o "$MBTILES" \
              -l flood \
              -Z "${MIN_ZOOM}" \
              -z "${MAX_ZOOM}" \
              --projection=EPSG:4326 \
              --force \
              --no-feature-limit \
              --no-tile-size-limit \
              --full-detail=14 \
              --low-detail=12 \
              --minimum-detail=12 \
              "input/$FILE"

            python3 - <<PY
          from pathlib import Path

          p = Path("$MBTILES")
          data = p.read_bytes()[:16]
          print("MBTiles first text:", data.decode("utf-8", errors="replace"))

          if not data.startswith(b"SQLite format 3"):
              raise SystemExit("Tippecanoe output is not MBTiles / SQLite")
          PY

            go run github.com/protomaps/go-pmtiles@latest convert \
              "$MBTILES" \
              "$PMTILES"

            go run github.com/protomaps/go-pmtiles@latest show \
              "$PMTILES"

            python3 - <<PY
          from pathlib import Path

          p = Path("$PMTILES")
          data = p.read_bytes()[:16]

          print("PMTiles first bytes:", data)
          print("PMTiles first text:", data.decode("utf-8", errors="replace"))

          if not data.startswith(b"PMTiles"):
              raise SystemExit("Not a valid PMTiles file")
          PY

            echo "Created:"
            ls -lh "$PMTILES"

            # 清掉中間檔，避免硬碟爆掉
            rm -f "input/$FILE" "$MBTILES"

          done < files.txt

          echo "===================================================="
          echo "All PMTiles outputs:"
          ls -lh output/
          echo "===================================================="

      - name: Upload PMTiles artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flood-pmtiles-v2
          path: output/*.pmtiles
          retention-days: 7
