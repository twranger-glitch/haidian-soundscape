name: Build Flood PMTiles

on:
  workflow_dispatch:
    inputs:
      flood_file:
        description: "選擇要轉成 PMTiles 的淹水 GeoJSON"
        required: true
        type: choice
        options:
          - Flood_150mm_6HR.json
          - Flood_200mm_12HR.json
          - Flood_200mm_24HR.json
          - Flood_250mm_6HR.json
          - Flood_300mm_12HR.json
          - Flood_350mm_24HR.json
          - Flood_350mm_6HR.json
          - Flood_400mm_12HR.json
          - Flood_500mm_24HR.json
          - Flood_650mm_24HR.json

env:
  HF_BASE_URL: https://huggingface.co/datasets/yhzkiki/haidian-soundscape-gis/resolve/main/data/gis/flood
  MIN_ZOOM: "7"
  MAX_ZOOM: "17"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-pmtiles:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare file names
        id: names
        shell: bash
        run: |
          FILE="${{ inputs.flood_file }}"
          BASENAME="${FILE%.json}"

          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "basename=$BASENAME" >> "$GITHUB_OUTPUT"

          echo "Selected file: $FILE"
          echo "Base name: $BASENAME"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            libsqlite3-dev \
            zlib1g-dev \
            wget \
            golang-go \
            python3

      - name: Build and install Tippecanoe
        run: |
          git clone https://github.com/mapbox/tippecanoe.git
          cd tippecanoe
          make -j"$(nproc)"
          sudo make install
          tippecanoe --version

      - name: Download GeoJSON from Hugging Face
        run: |
          mkdir -p input output

          wget \
            -O "input/${{ steps.names.outputs.file }}" \
            "${HF_BASE_URL}/${{ steps.names.outputs.file }}"

          echo "Downloaded source:"
          ls -lh input/

          python3 - <<'PY'
          import json
          from pathlib import Path

          p = Path("input/${{ steps.names.outputs.file }}")
          print("Source size:", p.stat().st_size, "bytes")

          with p.open("r", encoding="utf-8") as f:
              data = json.load(f)

          print("GeoJSON type:", data.get("type"))
          print("Feature count:", len(data.get("features", [])))

          if data.get("type") != "FeatureCollection":
              raise SystemExit("Source is not a GeoJSON FeatureCollection")
          PY

      - name: Convert GeoJSON to MBTiles
        run: |
          tippecanoe \
            -o "output/${{ steps.names.outputs.basename }}.mbtiles" \
            -l flood \
            -Z "${MIN_ZOOM}" \
            -z "${MAX_ZOOM}" \
            --projection=EPSG:4326 \
            --force \
            --no-feature-limit \
            --no-tile-size-limit \
            --full-detail=14 \
            --low-detail=12 \
            --minimum-detail=12 \
            "input/${{ steps.names.outputs.file }}"

          echo "After MBTiles build:"
          ls -lh output/

      - name: Check MBTiles magic bytes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path("output/${{ steps.names.outputs.basename }}.mbtiles")
          data = p.read_bytes()[:16]

          print("MBTiles first bytes:", data)
          print("MBTiles first text:", data.decode("utf-8", errors="replace"))

          if not data.startswith(b"SQLite format 3"):
              raise SystemExit("Tippecanoe output is not a valid MBTiles / SQLite file")
          PY

      - name: Convert MBTiles to real PMTiles
        run: |
          go run github.com/protomaps/go-pmtiles@latest convert \
            "output/${{ steps.names.outputs.basename }}.mbtiles" \
            "output/${{ steps.names.outputs.basename }}.pmtiles"

          echo "PMTiles info:"
          go run github.com/protomaps/go-pmtiles@latest show \
            "output/${{ steps.names.outputs.basename }}.pmtiles"

          echo "After PMTiles conversion:"
          ls -lh output/

      - name: Check PMTiles magic bytes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path("output/${{ steps.names.outputs.basename }}.pmtiles")
          data = p.read_bytes()[:16]

          print("PMTiles first bytes:", data)
          print("PMTiles first text:", data.decode("utf-8", errors="replace"))

          if not data.startswith(b"PMTiles"):
              raise SystemExit("Not a valid PMTiles file. It is probably still MBTiles.")
          PY

      - name: Upload PMTiles artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.names.outputs.basename }}-pmtiles
          path: output/${{ steps.names.outputs.basename }}.pmtiles
          retention-days: 7
