<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>海佃 溪遊記 | 聲音地景計畫</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <style>
        :root { --panel-offset: 20px; --accent-color: #27ae60; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif; background-color: #e9ecef; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        .glass-header { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 950px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); display: flex; justify-content: space-between; align-items: center; padding: 12px 25px; z-index: 1000; }
        .project-title { font-size: 18px; font-weight: 800; color: #2c3e50; margin: 0; }
        .project-title span { color: var(--accent-color); }
        .nav-buttons button { background: transparent; border: none; color: #34495e; font-size: 14px; font-weight: 600; cursor: pointer; padding: 8px 12px; border-radius: 8px; }
        .btn-submit { background: var(--accent-color) !important; color: white !important; box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3); border-radius: 12px !important; }

        /* 側邊面板共同樣式 */
        .drawer-panel { position: absolute; left: var(--panel-offset); background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); padding: 25px; z-index: 999; display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .drawer-panel.collapsed { transform: translateX(calc(-100% - var(--panel-offset))); }
        .toggle-btn { position: absolute; top: 50%; right: -32px; transform: translateY(-50%); width: 32px; height: 64px; background: rgba(255, 255, 255, 0.95); border-radius: 0 16px 16px 0; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; color: var(--accent-color); box-shadow: 6px 0 12px rgba(0,0,0,0.06); }

        /* 面板1：搜尋與類別 (Top: 100px) */
        #sidePanel { top: 100px; width: 280px; gap: 20px; }
        
        /* 🔥 面板2：時空抽屜 (Top: 420px) */
        #timelinePanel { top: 430px; width: 280px; gap: 10px; }
        .time-slider { width: 100%; accent-color: var(--accent-color); cursor: pointer; margin: 10px 0; }
        .time-display { font-size: 14px; font-weight: bold; color: var(--accent-color); text-align: center; background: rgba(39, 174, 96, 0.05); padding: 8px; border-radius: 10px; }

        .panel-label { font-size: 14px; font-weight: 800; color: #7f8c8d; margin-bottom: 8px; display: block; }
        .search-input { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid #eee; font-size: 14px; outline: none; box-sizing: border-box; }
        .filter-group { display: flex; flex-direction: column; gap: 12px; }
        .filter-item { display: flex; align-items: center; cursor: pointer; font-size: 14px; color: #34495e; font-weight: 600; }
        .filter-item input { margin-right: 12px; accent-color: var(--accent-color); width: 18px; height: 18px; }

        /* 播放器與卡片樣式維持 */
        .global-player { position: fixed; bottom: -150px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 800px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-radius: 24px; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); display: flex; align-items: center; padding: 15px 20px; gap: 15px; z-index: 2000; transition: 0.5s; }
        .global-player.active { bottom: 20px; } 
        .player-control-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--accent-color); color: white; border: none; font-size: 20px; cursor: pointer; }
        .waveform-wrapper { position: relative; width: 100%; height: 35px; border-radius: 6px; overflow: hidden; cursor: pointer; background: #f8f9fa; }
        .wave-base { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; opacity: 0.6; }
        .wave-progress { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; clip-path: inset(0 100% 0 0); }
        
        .leaflet-popup-content { margin: 0; width: 300px !important; }
        .sound-card { display: flex; flex-direction: column; }
        .sound-cover { width: 100%; height: 170px; object-fit: cover; }
        .sound-info { padding: 20px; }
        .sound-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .sound-category { background: var(--accent-color); color: white; padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .btn-play-main { background: var(--accent-color); color: white; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: bold; border: none; cursor: pointer; width: 100%; margin-top: 10px; }
        
        .admin-menu { margin-top: 10px; text-align: right; }
        .admin-menu summary { font-size: 18px; color: #dcdde1; cursor: pointer; list-style: none; display: inline-block; }
        .admin-dropdown { background: #f8f9fa; border-radius: 8px; padding: 8px 12px; display: inline-flex; gap: 12px; margin-top: 4px; border: 1px solid #eee; }
        .action-link-faint { font-size: 12px; color: #95a5a6; text-decoration: none; font-weight: bold; }

        @media (max-width: 600px) { 
            .drawer-panel { width: 220px; padding: 15px; } 
            #timelinePanel { top: 400px; }
        }
    </style>
</head>
<body>

    <header class="glass-header">
        <h1 class="project-title">海佃 <span>溪遊記</span></h1>
        <nav class="nav-buttons">
            <button onclick="openModal('aboutModal')">關於</button>
            <button class="btn-submit" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSdEq8I8O6zWZ95RO0Jf-YCKAuwUedMHsnThrU71FcTJQbuGGg/viewform', '_blank')">投稿</button>
        </nav>
    </header>

    <div id="sidePanel" class="drawer-panel">
        <button class="toggle-btn" onclick="togglePanel('sidePanel')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
        <div>
            <span class="panel-label">🔍 搜尋標題或採集者</span>
            <input type="text" id="searchInput" class="search-input" placeholder="輸入關鍵字..." oninput="filterMarkers()">
        </div>
        <hr style="border: 0; border-top: 1px solid #f0f0f0; margin: 5px 0;">
        <div>
            <span class="panel-label">📂 聲景類別篩選</span>
            <div class="filter-group">
                <label class="filter-item"><input type="radio" name="catFilter" value="all" checked onchange="filterMarkers()"> 所有聲景</label>
                <label class="filter-item"><input type="radio" name="catFilter" value="自然絮語" onchange="filterMarkers()"> 自然絮語</label>
                <label class="filter-item"><input type="radio" name="catFilter" value="常民聲" onchange="filterMarkers()"> 常民聲</label>
                <label class="filter-item"><input type="radio" name="catFilter" value="活動與產業聲" onchange="filterMarkers()"> 活動與產業聲</label>
                <label class="filter-item"><input type="radio" name="catFilter" value="空間聲" onchange="filterMarkers()"> 空間聲</label>
                <label class="filter-item"><input type="radio" name="catFilter" value="歲月回音" onchange="filterMarkers()"> 歲月回音</label>
            </div>
        </div>
    </div>

    <div id="timelinePanel" class="drawer-panel collapsed">
        <button class="toggle-btn" onclick="togglePanel('timelinePanel')"><span style="font-size:16px;">🕒</span></button>
        <span class="panel-label">🕒 聲景時間軸探索</span>
        <input type="range" id="timeSlider" class="time-slider" min="-1" max="23" value="-1" oninput="filterMarkers()">
        <div id="timeDisplay" class="time-display">全部時段</div>
        <p style="font-size:11px; color:#95a5a6; margin-top:5px;">撥動滑桿探索不同小時的聲景</p>
    </div>

    <div id="map"></div>

    <div id="globalPlayer" class="global-player">
        <button id="playerToggleBtn" class="player-control-btn" onclick="toggleGlobalAudio()">⏸</button>
        <div class="player-content">
            <div id="playerTitleUI" style="font-weight:800; color:#2c3e50; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">載入中...</div>
            <div class="waveform-wrapper" id="waveformWrapper" onclick="seekGlobalAudio(event)">
                <img id="waveBase" class="wave-base" src=""><img id="waveProgress" class="wave-progress" src="">
            </div>
        </div>
        <div class="volume-control"><input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="1" oninput="changeVolume()"></div>
        <button class="close-player-btn" onclick="closeGlobalPlayer()">✕</button>
    </div>

    <div id="aboutModal" class="modal-overlay" onclick="closeModalOnBgClick(event, 'aboutModal')"><div class="modal-box"><div class="modal-content"><h2>關於計畫</h2><p>海佃溪遊記聲音地景計畫...</p></div></div></div>

    <script>
        var map = L.map('map', { zoomControl: false }).setView([23.0485, 120.1985], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }).addTo(map);
        var markerCluster = L.markerClusterGroup({ maxClusterRadius: 40, spiderfyOnMaxZoom: true });
        var allMarkersData = [], globalAudio = new Audio(), currentAudioIndex = -1;

        // ⚠️ 請更換網址
        var API_URL = "https://script.google.com/macros/s/AKfycby4WSyAF4RMSahol0m5xoJ9LmIzn7JLIkdvJVOQlXvHFIzhKouqhxxDS0bGSg4oaLiVTg/exec"; 

        fetch(API_URL).then(res => res.json()).then(data => { allMarkersData = data; renderMarkers(data); });

        function renderMarkers(data) {
            markerCluster.clearLayers();
            data.forEach((item, index) => {
                var audioHTML = item.audioUrl ? `<button class="btn-play-main" onclick="startGlobalPlayback(${index})">▶ 播放此處聲景</button>` : `<p style="background:#f39c12; color:white; padding:10px; border-radius:10px; text-align:center; font-size:12px; font-weight:bold; margin-top:10px;">📷 生態影像記錄</p>`;
                var reportUrl = "https://docs.google.com/forms/d/e/1FAIpQLSdORjyp5IXZ_h6L7AaeFxXxJVbDEI2oqjCidzRnAfkJFODM1Q/viewform?usp=pp_url&entry.977398317=%E2%9C%8F%EF%B8%8F+%E6%8F%90%E5%87%BA%E5%8B%98%E8%AA%A4&entry.111338985=" + encodeURIComponent(item.title);
                var deleteUrl = "https://docs.google.com/forms/d/e/1FAIpQLSdORjyp5IXZ_h6L7AaeFxXxJVbDEI2oqjCidzRnAfkJFODM1Q/viewform?usp=pp_url&entry.977398317=%F0%9F%97%91%EF%B8%8F+%E5%8E%9F%E4%BD%9C%E8%80%85%E7%94%B3%E8%AB%8B%E4%B8%8B%E6%9E%B6&entry.111338985=" + encodeURIComponent(item.title);
                
                var cardHTML = `<div class="sound-card"><img src="${item.coverUrl}" class="sound-cover" onerror="this.src='https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?q=80&w=600&auto=format&fit=crop'"><div class="sound-info"><div class="sound-meta"><span class="sound-category">${item.category.split(/[(（]/)[0]}</span><span class="sound-date">${item.date.replace(" 00:00:00","")}</span></div><h3 class="sound-title">${item.title}</h3><div style="font-size:12px; color:#95a5a6; margin-bottom:10px;">📍 ${item.author}</div><p style="font-size:13px; color:#555; line-height:1.5;">${item.description}</p>${audioHTML}<details class="admin-menu"><summary>⋮</summary><div class="admin-dropdown"><a href="${reportUrl}" target="_blank" class="action-link-faint">✏️ 勘誤</a><span style="color:#eee">|</span><a href="${deleteUrl}" target="_blank" class="action-link-faint">🗑️ 下架</a></div></details></div></div>`;
                var marker = L.marker([item.lat, item.lon]).bindPopup(cardHTML);
                marker.on('click', () => { if(item.audioUrl) prepareGlobalPlayer(index); });
                markerCluster.addLayer(marker);
            });
            map.addLayer(markerCluster);
        }

        function filterMarkers() {
            var searchTerm = document.getElementById('searchInput').value.toLowerCase();
            var selectedCat = document.querySelector('input[name="catFilter"]:checked').value;
            var hourLimit = parseInt(document.getElementById('timeSlider').value);
            
            // 更新時間顯示
            document.getElementById('timeDisplay').innerText = hourLimit === -1 ? "全部時段" : hourLimit + ":00 - " + hourLimit + ":59";

            var filtered = allMarkersData.filter(item => {
                var matchS = item.title.toLowerCase().includes(searchTerm) || item.author.toLowerCase().includes(searchTerm);
                var matchC = (selectedCat === 'all') || item.category.includes(selectedCat);
                var matchT = hourLimit === -1 || (item.date.match(/\s(\d{2}):/) && parseInt(item.date.match(/\s(\d{2}):/)[1]) === hourLimit);
                return matchS && matchC && matchT;
            });
            renderMarkers(filtered);
        }

        function togglePanel(id) { document.getElementById(id).classList.toggle('collapsed'); }

        function getWaveformUrl(url, hex) { return url.replace('/upload/', `/upload/fl_waveform,co_rgb:${hex},b_transparent,w_800,h_80,c_scale/`).replace(/\.[^.]+$/, '.png'); }
        function prepareGlobalPlayer(index) {
            var item = allMarkersData[index];
            if (currentAudioIndex === index) { document.getElementById('globalPlayer').classList.add('active'); return; }
            currentAudioIndex = index;
            document.getElementById('playerTitleUI').innerText = item.title + " (採集者: " + item.author + ")";
            document.getElementById('waveBase').src = getWaveformUrl(item.audioUrl, "bdc3c7");
            document.getElementById('waveProgress').src = getWaveformUrl(item.audioUrl, "27ae60");
            document.getElementById('waveProgress').style.clipPath = 'inset(0 100% 0 0)';
            globalAudio.pause(); globalAudio.src = item.audioUrl;
            document.getElementById('playerToggleBtn').innerText = "▶";
            document.getElementById('globalPlayer').classList.add('active');
        }
        function startGlobalPlayback(index) { if (currentAudioIndex !== index) prepareGlobalPlayer(index); globalAudio.play(); document.getElementById('playerToggleBtn').innerText = "⏸"; }
        function toggleGlobalAudio() { if (globalAudio.paused) { globalAudio.play(); document.getElementById('playerToggleBtn').innerText = "⏸"; } else { globalAudio.pause(); document.getElementById('playerToggleBtn').innerText = "▶"; } }
        function closeGlobalPlayer() { globalAudio.pause(); document.getElementById('globalPlayer').classList.remove('active'); currentAudioIndex = -1; }
        globalAudio.ontimeupdate = () => { if(globalAudio.duration) document.getElementById('waveProgress').style.clipPath = `inset(0 ${100-(globalAudio.currentTime/globalAudio.duration*100)}% 0 0)`; };
        globalAudio.onended = () => { document.getElementById('playerToggleBtn').innerText = "▶"; };
        function seekGlobalAudio(e) { var rect = document.getElementById('waveformWrapper').getBoundingClientRect(); globalAudio.currentTime = ((e.clientX - rect.left) / rect.width) * globalAudio.duration; }
        function changeVolume() { globalAudio.volume = document.getElementById('volumeSlider').value; }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function closeModalOnBgClick(e, id) { if (e.target.id === id) closeModal(id); }
        
        // 手機版自動收合
        if (window.innerWidth <= 600) { 
            document.getElementById('sidePanel').classList.add('collapsed'); 
            document.getElementById('timelinePanel').classList.add('collapsed');
        }
    </script>
</body>
</html>
