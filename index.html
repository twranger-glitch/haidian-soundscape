<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>海佃 溪遊記 | 聲音地景計畫</title>
    
    <meta name="robots" content="noindex, nofollow" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
        :root { --panel-offset: 20px; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif; background-color: #e9ecef; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        .glass-header { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 950px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); display: flex; justify-content: space-between; align-items: center; padding: 12px 25px; z-index: 1000; gap: 10px; }
        .project-title { font-size: 18px; font-weight: 800; color: #2c3e50; margin: 0; display: flex; align-items: baseline; }
        .project-title .main-title { color: #27ae60; margin: 0 6px; }
        .project-title .sub-title { font-size: 13px; color: #7f8c8d; font-weight: 600; }

        .nav-buttons { display: flex; gap: 8px; align-items: center; }
        .nav-buttons button { background: transparent; border: none; color: #34495e; font-size: 14px; font-weight: 600; cursor: pointer; padding: 8px 12px; border-radius: 8px; transition: 0.3s; }
        .nav-buttons button:hover { background: rgba(39, 174, 96, 0.1); color: #27ae60; }
        .btn-submit { background: #27ae60 !important; color: white !important; box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3); }
        .btn-submit:hover { background: #219150 !important; transform: translateY(-2px); }

        .side-panel { position: absolute; top: 100px; left: var(--panel-offset); width: 260px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); padding: 20px; z-index: 999; display: flex; flex-direction: column; gap: 15px; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .side-panel.collapsed { transform: translateX(calc(-100% - var(--panel-offset))); }

        .toggle-tab { position: absolute; top: 50%; right: -32px; transform: translateY(-50%); width: 32px; height: 64px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 0 16px 16px 0; box-shadow: 6px 0 12px rgba(0,0,0,0.06); border: 1px solid rgba(255,255,255,0.8); border-left: none; cursor: pointer; display: flex; justify-content: center; align-items: center; color: #27ae60; transition: background 0.3s, color 0.3s; }
        .toggle-tab:hover { background: #fff; color: #1e8449; }
        .toggle-icon { width: 20px; height: 20px; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .side-panel.collapsed .toggle-icon { transform: rotate(180deg); }

        .panel-label { font-size: 14px; font-weight: 800; color: #7f8c8d; margin-bottom: 5px; display: block; }
        .search-input { width: 100%; padding: 10px 15px; border-radius: 12px; border: 1px solid #ddd; font-size: 14px; outline: none; box-sizing: border-box; }
        .search-input:focus { border-color: #27ae60; }
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-item { display: flex; align-items: center; cursor: pointer; font-size: 14px; color: #34495e; font-weight: 600; }
        .filter-item input { margin-right: 10px; accent-color: #27ae60; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 2000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box { background: white; border-radius: 24px; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; position: relative; }
        .modal-close-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.3); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center; z-index: 10; }
        .modal-img { width: 100%; height: 200px; object-fit: cover; }
        .modal-content { padding: 25px; text-align: justify; }
        .modal-title { font-size: 22px; color: #2c3e50; margin: 0 0 8px 0; font-weight: 800; line-height: 1.3; }
        .modal-tag { display: inline-block; background: #34495e; color: #ecf0f1; padding: 5px 12px; border-radius: 12px; font-size: 13px; font-weight: bold; margin-bottom: 18px; }
        .modal-text { font-size: 15px; color: #444; line-height: 1.7; margin: 0 0 15px 0; }
        .quote-block { margin-top: 20px; padding: 18px; background: #f8f9fa; border-left: 4px solid #27ae60; border-radius: 0 12px 12px 0; }
        
        .leaflet-popup-content-wrapper { border-radius: 20px; overflow: hidden; }
        .leaflet-popup-content { margin: 0; width: 300px !important; }
        .sound-card { display: flex; flex-direction: column; }
        .sound-cover { width: 100%; height: 170px; object-fit: cover; background-color: #f1f2f6;}
        .sound-info { padding: 20px; padding-bottom: 15px; } 
        .sound-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .sound-category { background: #27ae60; color: white; padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .sound-date { color: #95a5a6; font-size: 11px; font-weight: 600; }
        .sound-title { font-size: 18px; font-weight: bold; margin: 0 0 5px 0; }
        .photo-badge { background: #f39c12; color: #fff; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: bold; text-align: center; margin: 10px 0 0 0;}
        
        .btn-play-main { background: #27ae60; color: white; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; margin-top: 5px; box-shadow: 0 4px 10px rgba(39,174,96,0.3); width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-play-main:hover { background: #219150; transform: translateY(-2px); }

        /* 🔥 新增：隱藏式防誤觸管理選單 (⋮) */
        .admin-menu { margin-top: 5px; text-align: right; }
        .admin-menu summary { font-size: 18px; color: #dcdde1; cursor: pointer; list-style: none; display: inline-block; padding: 0 5px; user-select: none; }
        .admin-menu summary::-webkit-details-marker { display: none; } /* 隱藏預設的黑色小三角形 */
        .admin-menu summary:hover, .admin-menu[open] summary { color: #7f8c8d; }
        
        .admin-dropdown { background: #f8f9fa; border-radius: 8px; padding: 8px 12px; display: inline-flex; gap: 12px; margin-top: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .action-link-faint { font-size: 12px; color: #95a5a6; text-decoration: none; transition: color 0.2s; font-weight: bold; }
        .action-link-faint:hover { color: #e74c3c; }

        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large { background-color: rgba(39, 174, 96, 0.6); }
        .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div { background-color: rgba(39, 174, 96, 0.9); color: white; font-weight: bold; }

        /* 全站常駐播放器 */
        .global-player {
            position: fixed; bottom: -150px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 800px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 24px; box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
            display: flex; align-items: center; padding: 15px 20px; gap: 15px;
            z-index: 2000; transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .global-player.active { bottom: 20px; } 

        .player-control-btn {
            width: 45px; height: 45px; flex-shrink: 0; border-radius: 50%; 
            background: #27ae60; color: white; border: none; font-size: 20px; 
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4); transition: 0.2s;
        }
        .player-control-btn:hover { transform: scale(1.08); background: #219150; }

        .player-content { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
        
        .player-meta-ui { display: flex; justify-content: space-between; align-items: flex-end; }
        .player-title-ui { font-weight: 800; color: #2c3e50; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-author-ui { color: #7f8c8d; font-size: 12px; white-space: nowrap; flex-shrink: 0; margin-left: 10px; }

        .waveform-wrapper { position: relative; width: 100%; height: 35px; border-radius: 6px; overflow: hidden; cursor: pointer; background: #f8f9fa; }
        .wave-base { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; opacity: 0.6; }
        .wave-progress { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; clip-path: inset(0 100% 0 0); }

        .volume-control { display: flex; align-items: center; gap: 8px; margin-left: 10px; margin-right: 10px; }
        .volume-slider { width: 80px; cursor: pointer; accent-color: #27ae60; height: 4px; }
        
        .close-player-btn { background: transparent; border: none; font-size: 20px; color: #bdc3c7; cursor: pointer; padding: 5px; flex-shrink: 0; transition: 0.2s; }
        .close-player-btn:hover { color: #e74c3c; }

        @media (max-width: 600px) { 
            :root { --panel-offset: 10px; } 
            .side-panel { width: 220px; padding: 15px; } 
            .project-title .sub-title { display: none; } 
            .global-player { padding: 12px 15px; gap: 10px; border-radius: 20px; width: 95%;}
            .player-control-btn { width: 40px; height: 40px; font-size: 16px; }
            .waveform-wrapper { height: 28px; }
            .volume-control { display: none; }
        }
    </style>
</head>
<body>

    <header class="glass-header">
        <h1 class="project-title">海佃 <span class="main-title">溪遊記</span> <span class="sub-title">聲音地景計畫</span></h1>
        <nav class="nav-buttons">
            <button onclick="openModal('aboutModal')">關於計畫</button>
            <button onclick="openModal('contactModal')">聯絡我們</button>
            <button class="btn-submit" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSdEq8I8O6zWZ95RO0Jf-YCKAuwUedMHsnThrU71FcTJQbuGGg/viewform', '_blank')">我要投稿</button>
        </nav>
    </header>

    <div id="sidePanel" class="side-panel">
        <button class="toggle-tab" onclick="toggleSearchPanel()" title="收合/展開搜尋面板">
            <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <div>
            <span class="panel-label">🔍 搜尋標題或採集者</span>
            <input type="text" id="searchInput" class="search-input" placeholder="輸入關鍵字..." oninput="filterMarkers()">
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 5px 0;">
        <div>
            <span class="panel-label">📂 聲景類別篩選</span>
            <div class="filter-group">
                <label class="filter-item"><input type="radio" name="catFilter" value="all" checked onchange="filterMarkers()"> 顯示所有聲景</label>
                <label class="filter-item"><input type="radio" name="catFilter" value="自然絮語" onchange="filterMarkers()"> 自然絮語</label>
                <label class="filter-item"><input type="radio" name="catFilter" value="常民聲" onchange="filterMarkers()"> 常民聲</label>
                <label class="filter-item"><input type="radio" name="catFilter" value="活動與產業聲" onchange="filterMarkers()"> 活動與產業聲</label>
                <label class="filter-item"><input type="radio" name="catFilter" value="空間聲" onchange="filterMarkers()"> 空間聲</label>
                <label class="filter-item"><input type="radio" name="catFilter" value="歲月回音" onchange="filterMarkers()"> 歲月回音</label>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div id="globalPlayer" class="global-player">
        <button id="playerToggleBtn" class="player-control-btn" onclick="toggleGlobalAudio()">⏸</button>
        <div class="player-content">
            <div class="player-meta-ui">
                <div id="playerTitleUI" class="player-title-ui">載入中...</div>
                <div id="playerAuthorUI" class="player-author-ui"></div>
            </div>
            <div class="waveform-wrapper" id="waveformWrapper" onclick="seekGlobalAudio(event)">
                <img id="waveBase" class="wave-base" src="" alt="waveform_bg" onerror="this.style.opacity=0">
                <img id="waveProgress" class="wave-progress" src="" alt="waveform_fg" onerror="this.style.opacity=0">
            </div>
        </div>
        
        <div class="volume-control">
            <span id="muteBtn" onclick="toggleMute()" style="cursor:pointer; font-size: 16px;" title="靜音/解除靜音">🔊</span>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="1" oninput="changeVolume()" title="調整音量">
        </div>

        <button class="close-player-btn" onclick="closeGlobalPlayer()" title="關閉播放器">✕</button>
    </div>

    <div id="aboutModal" class="modal-overlay" onclick="closeModalOnBgClick(event, 'aboutModal')">
        <div class="modal-box">
            <button class="modal-close-btn" onclick="closeModal('aboutModal')">×</button>
            <img src="https://images.unsplash.com/photo-1541963463532-d68292c34b19?q=80&w=800&auto=format&fit=crop" class="modal-img">
            <div class="modal-content">
                <h2 class="modal-title">海佃地圖<br><span style="font-size: 18px; color: #7f8c8d;">Haidian Hidden Library</span></h2>
                <div class="modal-tag">Hidden below, growing beyond.</div>
                <p class="modal-text">海佃地下圖書室，不只是校園一隅的空間，更是孵育思想的基地。</p>
            </div>
        </div>
    </div>

    <div id="contactModal" class="modal-overlay" onclick="closeModalOnBgClick(event, 'contactModal')">
        <div class="modal-box">
            <button class="modal-close-btn" onclick="closeModal('contactModal')">×</button>
            <div class="modal-content">
                <h2 class="modal-title">聯絡資訊</h2>
                <div style="background: #f8f9fa; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px;">
                    <span style="font-size: 24px;">📍</span><div><strong style="color: #2c3e50;">海佃國小 地下圖書室</strong></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var map = L.map('map', { zoomControl: false }).setView([23.0485, 120.1985], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }).addTo(map);

        L.Control.geocoder({ defaultMarkGeocode: false, placeholder: "搜尋地點或地址..." })
            .on('markgeocode', function(e) { map.fitBounds(e.geocode.bbox); })
            .addTo(map);

        var markerCluster = L.markerClusterGroup({ 
            maxClusterRadius: 40,
            spiderfyOnMaxZoom: true 
        });
        
        var allMarkersData = [];
        var globalAudio = new Audio();
        var currentAudioIndex = -1;

        // ⚠️ 這裡請填入您的 Google Apps Script 網址
        var API_URL = "https://script.google.com/macros/s/AKfycby4WSyAF4RMSahol0m5xoJ9LmIzn7JLIkdvJVOQlXvHFIzhKouqhxxDS0bGSg4oaLiVTg/exec"; 

        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                allMarkersData = data;
                renderMarkers(data);
            });

        function renderMarkers(data) {
            markerCluster.clearLayers();
            
            data.forEach((item, index) => {
                var audioHTML = item.audioUrl 
                    ? `<button class="btn-play-main" onclick="startGlobalPlayback(${index})">▶ 播放此處聲景</button>` 
                    : `<p class="photo-badge">📷 這是生態影像，無聲音記錄</p>`;
                    
                var coverHTML = `<img src="${item.coverUrl}" class="sound-cover" onerror="this.src='https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?q=80&w=600&auto=format&fit=crop'">`;
                var cleanCat = item.category.split(/[(（]/)[0].trim();

                var displayDate = item.date;
                if (displayDate && displayDate.endsWith(" 00:00:00")) displayDate = displayDate.replace(" 00:00:00", "");

                var reportUrl = "https://docs.google.com/forms/d/e/1FAIpQLSdORjyp5IXZ_h6L7AaeFxXxJVbDEI2oqjCidzRnAfkJFODM1Q/viewform?usp=pp_url&entry.977398317=%E2%9C%8F%EF%B8%8F+%E6%8F%90%E5%87%BA%E5%8B%98%E8%AA%A4&entry.111338985=" + encodeURIComponent(item.title);
                var deleteUrl = "https://docs.google.com/forms/d/e/1FAIpQLSdORjyp5IXZ_h6L7AaeFxXxJVbDEI2oqjCidzRnAfkJFODM1Q/viewform?usp=pp_url&entry.977398317=%F0%9F%97%91%EF%B8%8F+%E5%8E%9F%E4%BD%9C%E8%80%85%E7%94%B3%E8%AB%8B%E4%B8%8B%E6%9E%B6&entry.111338985=" + encodeURIComponent(item.title);

                // 🔥 導入原生 <details> 標籤，點擊 ⋮ 才會展開，完美防誤觸
                var cardHTML = `
                    <div class="sound-card">
                        ${coverHTML}
                        <div class="sound-info">
                            <div class="sound-meta"><span class="sound-category">${cleanCat}</span><span class="sound-date">${displayDate}</span></div>
                            <h3 class="sound-title">${item.title}</h3>
                            
                            <div style="font-size:12px; color:#95a5a6; margin-bottom:10px;">📍 ${item.author}</div>
                            <p style="font-size:13px; color:#555; line-height:1.5; margin-top: 0;">${item.description}</p>
                            ${audioHTML}

                            <details class="admin-menu">
                                <summary title="管理選項">⋮</summary>
                                <div class="admin-dropdown">
                                    <a href="${reportUrl}" target="_blank" class="action-link-faint">✏️ 勘誤</a>
                                    <span style="color: #dcdde1;">|</span>
                                    <a href="${deleteUrl}" target="_blank" class="action-link-faint">🗑️ 下架</a>
                                </div>
                            </details>

                        </div>
                    </div>
                `;
                var marker = L.marker([item.lat, item.lon]).bindPopup(cardHTML);
                
                marker.on('click', function() {
                    if (item.audioUrl) {
                        prepareGlobalPlayer(index);
                    }
                });

                markerCluster.addLayer(marker);
            });
            map.addLayer(markerCluster);
        }

        function getWaveformUrl(audioUrl, colorHex) {
            if (!audioUrl) return "";
            return audioUrl.replace('/upload/', `/upload/fl_waveform,co_rgb:${colorHex},b_transparent,w_800,h_80,c_scale/`).replace(/\.[^.]+$/, '.png');
        }

        function prepareGlobalPlayer(index) {
            var item = allMarkersData[index];
            if (!item || !item.audioUrl) return;

            if (currentAudioIndex === index) {
                document.getElementById('globalPlayer').classList.add('active');
                return;
            }

            currentAudioIndex = index;
            
            document.getElementById('playerTitleUI').innerText = item.title;
            document.getElementById('playerAuthorUI').innerText = "📍 " + item.author;

            document.getElementById('waveBase').style.opacity = 0.6; 
            document.getElementById('waveProgress').style.opacity = 1;
            document.getElementById('waveBase').src = getWaveformUrl(item.audioUrl, "bdc3c7");
            document.getElementById('waveProgress').src = getWaveformUrl(item.audioUrl, "27ae60");
            document.getElementById('waveProgress').style.clipPath = 'inset(0 100% 0 0)';

            globalAudio.pause();
            globalAudio.src = item.audioUrl;
            globalAudio.volume = document.getElementById('volumeSlider').value;
            
            document.getElementById('playerToggleBtn').innerText = "▶";
            document.getElementById('globalPlayer').classList.add('active');
        }

        function startGlobalPlayback(index) {
            if (currentAudioIndex !== index) {
                prepareGlobalPlayer(index);
            }
            globalAudio.play();
            document.getElementById('playerToggleBtn').innerText = "⏸";
        }

        function toggleGlobalAudio() {
            if (!globalAudio.src) return;
            if (globalAudio.paused) {
                globalAudio.play();
                document.getElementById('playerToggleBtn').innerText = "⏸";
            } else {
                globalAudio.pause();
                document.getElementById('playerToggleBtn').innerText = "▶";
            }
        }

        function closeGlobalPlayer() {
            globalAudio.pause();
            globalAudio.currentTime = 0;
            document.getElementById('globalPlayer').classList.remove('active');
            currentAudioIndex = -1;
        }

        globalAudio.addEventListener('timeupdate', function() {
            if (globalAudio.duration) {
                var percentage = (globalAudio.currentTime / globalAudio.duration) * 100;
                var unplayedPercentage = 100 - percentage;
                document.getElementById('waveProgress').style.clipPath = `inset(0 ${unplayedPercentage}% 0 0)`;
            }
        });

        globalAudio.addEventListener('ended', function() {
            document.getElementById('playerToggleBtn').innerText = "▶";
            document.getElementById('waveProgress').style.clipPath = `inset(0 100% 0 0)`;
        });

        function seekGlobalAudio(event) {
            if (!globalAudio.src || !globalAudio.duration) return;
            var wrapper = document.getElementById('waveformWrapper');
            var rect = wrapper.getBoundingClientRect();
            var clickX = event.clientX - rect.left;
            var newTime = (clickX / rect.width) * globalAudio.duration;
            globalAudio.currentTime = newTime;
        }

        function changeVolume() {
            var vol = document.getElementById('volumeSlider').value;
            globalAudio.volume = vol;
            var muteBtn = document.getElementById('muteBtn');
            if (vol == 0) {
                muteBtn.innerText = "🔇";
            } else if (vol < 0.5) {
                muteBtn.innerText = "🔉";
            } else {
                muteBtn.innerText = "🔊";
            }
        }

        function toggleMute() {
            var slider = document.getElementById('volumeSlider');
            if (globalAudio.volume > 0) {
                globalAudio.dataset.lastVolume = globalAudio.volume;
                globalAudio.volume = 0;
                slider.value = 0;
                document.getElementById('muteBtn').innerText = "🔇";
            } else {
                var lastVol = globalAudio.dataset.lastVolume || 1;
                globalAudio.volume = lastVol;
                slider.value = lastVol;
                document.getElementById('muteBtn').innerText = (lastVol < 0.5) ? "🔉" : "🔊";
            }
        }

        function filterMarkers() {
            var searchTerm = document.getElementById('searchInput').value.toLowerCase();
            var selectedCat = document.querySelector('input[name="catFilter"]:checked').value;
            var filtered = allMarkersData.filter(item => {
                var matchesSearch = item.title.toLowerCase().includes(searchTerm) || item.author.toLowerCase().includes(searchTerm);
                var matchesCat = (selectedCat === 'all') || item.category.includes(selectedCat);
                return matchesSearch && matchesCat;
            });
            renderMarkers(filtered);
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function closeModalOnBgClick(e, id) { if (e.target.id === id) closeModal(id); }
        function toggleSearchPanel() { document.getElementById('sidePanel').classList.toggle('collapsed'); }

        if (window.innerWidth <= 600) { document.getElementById('sidePanel').classList.add('collapsed'); }
    </script>
</body>
</html>
