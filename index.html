<!DOCTYPE html>
<html lang="zh-TW">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>海佃國小地下圖書室 - 採購與許願網</title>
 <!-- 載入 Tailwind CSS -->
 <script src="https://cdn.tailwindcss.com"></script>
 <!-- 載入 React 核心 -->
 <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
 <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
 <!-- 載入 Babel (負責翻譯 React 語法) -->
 <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
 <!-- 🌟 鎖定穩定版的 Lucide SVG 圖示庫 -->
 <script src="https://unpkg.com/lucide@0.292.0"></script>
 <style>
   /* 隱藏捲軸但保留滑動功能 */
   .hide-scrollbar::-webkit-scrollbar { display: none; }
   .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
   /* 全域按鈕過渡動畫 */
   button { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
   button:active { transform: scale(0.97); }
   /* 確保換行字元能正確顯示在 Modal 中 */
   .whitespace-pre-wrap { white-space: pre-wrap; }
 </style>
</head>
<body class="bg-slate-50 selection:bg-indigo-100 selection:text-indigo-900 text-slate-800 antialiased">
 <div id="root"></div>
 
 <script type="text/babel" data-type="module">
   const { useState, useEffect, Component, useRef } = React;
   
   // 載入 Firebase 模組
   import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
   import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
   import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc, arrayUnion, arrayRemove, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
 
   // 🌟 SVG 圖示元件（穩定版：單顆圖示獨立渲染，不再全頁 createIcons 掃描）
   const normalizeIconName = (value = "") =>
     String(value).toLowerCase().replace(/[^a-z0-9]/g, '');
 
   const Icon = ({ name, className = "w-5 h-5", fill = "none", strokeWidth = 2 }) => {
     const [svgContent, setSvgContent] = useState("");
 
     useEffect(() => {
       let mounted = true;
       let retries = 0;
 
       const renderIcon = () => {
         const lucideLib = window.lucide;
         // 確保能抓到 icons 集合 (部分版本直接綁在 window.lucide 上)
         const icons = lucideLib?.icons || lucideLib;
 
         if (!icons || Object.keys(icons).length === 0) {
           retries++;
           if (mounted && retries < 20) {
              setTimeout(renderIcon, 100);
           } else if (mounted) {
              setSvgContent(
                `<svg class="${className}" fill="${fill}" stroke="currentColor" stroke-width="${strokeWidth}" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4"></path><path d="M12 16h.01"></path></svg>`
              );
           }
           return;
         }
 
         try {
           const normalizedTarget = normalizeIconName(name);
           const matchedKey = Object.keys(icons).find(
              key => normalizeIconName(key) === normalizedTarget
           );
 
           const iconDef = matchedKey ? icons[matchedKey] : null;
 
           if (iconDef && typeof iconDef.toSvg === 'function') {
              const html = iconDef.toSvg({
                class: className,
                fill: fill,
                'stroke-width': strokeWidth,
                'aria-hidden': 'true',
                'focusable': 'false'
              });
 
              if (mounted) setSvgContent(html);
              return;
           }
 
           console.warn(`Icon '${name}' 找不到，顯示預設圖示。`);
           if (mounted) {
              setSvgContent(
                `<svg class="${className}" fill="${fill}" stroke="currentColor" stroke-width="${strokeWidth}" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4"></path><path d="M12 16h.01"></path></svg>`
              );
           }
         } catch (error) {
           console.error(`Icon '${name}' 渲染失敗:`, error);
           if (mounted) {
              setSvgContent(
                `<svg class="${className}" fill="${fill}" stroke="currentColor" stroke-width="${strokeWidth}" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4"></path><path d="M12 16h.01"></path></svg>`
              );
           }
         }
       };
 
       renderIcon();
       return () => { mounted = false; };
     }, [name, className, fill, strokeWidth]);
 
     if (!svgContent) {
       return <span className={`inline-block ${className} flex-shrink-0`} />;
     }
 
     return (
       <span
         dangerouslySetInnerHTML={{ __html: svgContent }}
         className="inline-flex items-center justify-center flex-shrink-0 align-middle"
       />
     );
   };
 
   // 🔥 Firebase Web Config (融合動態環境變數支援)
   const fallbackConfig = {
     apiKey: "AIzaSyA4gSwrBmvv0pThiWdS27zWWY0i--e2xv4",
     authDomain: "book-purchase-system.firebaseapp.com",
     projectId: "book-purchase-system",
     storageBucket: "book-purchase-system.firebasestorage.app",
     messagingSenderId: "659149394622",
     appId: "1:659149394622:web:4505c2d1cbb3e94d83c4ef"
   };
 
   const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : fallbackConfig;
   const app = initializeApp(firebaseConfig);
   const auth = getAuth(app);
   const db = getFirestore(app);
   const appId = typeof __app_id !== 'undefined' ? __app_id : "school-library-app";
 
   const AUTHORS = ['齊藤洋', '張友漁', '艾琳．杭特', '原京子', '原裕', '王文華', '林哲璋', '王淑芬', '陳郁如', '林世仁', '廖炳焜', '廣嶋玲子', '吉靜如', '肥志', '鄭宗弦', '岑澎維', '哲也', '張嘉驊', 'Popcorn Story', '吉竹伸介', '海狗房東', '阿德蝸', 'Troll', '香川元太郎', '林柏廷', '宮西達也', '李光福', '賴馬', '劉旭恭'].sort((a, b) => a.localeCompare(b, 'zh-TW')); 
   const SERIES = ['神奇柑仔店', '達克比', '科學發明王', '科學實驗王', '楓之谷數學神偷', 'X尋寶探險隊', 'X超強對決王', 'Ｘ萬獸探險隊', 'X極限挑戰王', '狼人生存遊戲', '科學偵探謎野真實', 'X機器人戰隊', '植物大戰殭屍', '紅豆綠豆碰'].sort((a, b) => a.localeCompare(b, 'zh-TW'));
 
   // 🛡️ 姓名遮蔽處理器 (例如：王小明 -> 王小O)
   const maskName = (name) => {
     if (!name) return '無名氏';
     const str = String(name).trim();
     if (str.length <= 1) return str;
     if (str.length === 2) return str[0] + 'O';
     return str.slice(0, -1) + 'O';
   };
 
   class ErrorBoundary extends Component {
     constructor(props) { super(props); this.state = { hasError: false, error: null }; }
     static getDerivedStateFromError(error) { return { hasError: true, error }; }
     render() {
       if (this.state.hasError) {
         return (
           <div className="p-8 max-w-2xl mx-auto mt-10 bg-rose-50 border border-rose-200 rounded-2xl text-rose-800 shadow-sm">
              <div className="flex items-center gap-3 mb-4"><Icon name="alert-triangle" className="w-8 h-8 text-rose-600" /><h1 className="text-2xl font-bold">系統發生錯誤</h1></div>
              <p className="mb-4 text-rose-700 font-medium">網頁渲染時遇到無法解析的資料，請截圖此畫面給開發者：</p>
              <pre className="bg-white p-5 rounded-xl overflow-auto text-sm border border-rose-100 shadow-inner font-mono">{this.state.error?.toString()}</pre>
           </div>
         );
       }
       return this.props.children;
     }
    }
 
   function App() {
     const [user, setUser] = useState(null);
     const [activeTab, setActiveTab] = useState('new-books'); 
     const [books, setBooks] = useState([]);
     const [wishlists, setWishlists] = useState([]);
     const [inventoryDict, setInventoryDict] = useState({}); 
     const [inventoryLastUpdated, setInventoryLastUpdated] = useState(null);
     const [loading, setLoading] = useState(true);
     const [dailyVotesCount, setDailyVotesCount] = useState(0); 
     
     const [filterType, setFilterType] = useState('all'); 
     const [filterKeyword, setFilterKeyword] = useState('all');
     
     const [wishFormData, setWishFormData] = useState({ title: '', isbn: '', reason: '', duplicateReason: '', vipCode: '' });
     const [inventoryCheckResult, setInventoryCheckResult] = useState(null);
     const [inventoryCount, setInventoryCount] = useState(0);
 
     const [fastPassModalBook, setFastPassModalBook] = useState(null);
     const [fastPassInput, setFastPassInput] = useState('');

     // 取代原生 alert() 的 Modal 狀態
     const [modalContent, setModalContent] = useState(null);

     const showMessage = (message, title = "系統提示") => {
       setModalContent({ title, message });
     };
 
     // 🔥 處理 Google 登入狀態與訪客模式
     useEffect(() => {
       let isPreviewMode = false;
       const initAuth = async () => {
         try { 
           // 加入自訂 Token 防護，確保沙盒環境連線正常
           if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
             await signInWithCustomToken(auth, __initial_auth_token);
           } else {
             await signInAnonymously(auth); 
           }
         } catch (error) { 
           if (error.code === 'auth/unauthorized-domain' || error.message.includes('blocked')) {
              isPreviewMode = true;
              setUser({ isAnonymous: true, uid: 'preview-guest-uid', displayName: '預覽訪客' });
           }
         }
       };
       initAuth();
       const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
         if (!isPreviewMode) setUser(currentUser);
       });
       return () => unsubscribe();
     }, []);
 
     // 監聽 Firebase 資料 (加入 !user 防禦機制)
     useEffect(() => {
       if (!user) return; // 確保有使用者才載入資料

       let unsubStats = () => {};
       if (!user.isAnonymous) {
         const today = new Date().toLocaleDateString('en-CA');
         const statsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'voteStats', 'daily');
         unsubStats = onSnapshot(statsRef, (docSnap) => {
           if (docSnap.exists()) {
             const data = docSnap.data();
             if (data.date === today) setDailyVotesCount(data.count || 0);
             else setDailyVotesCount(0); 
           } else { setDailyVotesCount(0); }
         }, err => console.error("Stats Error:", err));
       } else {
         setDailyVotesCount(0);
       }
 
       const booksRef = collection(db, 'artifacts', appId, 'public', 'data', 'books');
       const unsubscribeBooks = onSnapshot(booksRef, (snapshot) => {
         const booksData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
         const getTimestamp = (val) => {
           if (!val) return 0;
           try {
              if (typeof val === 'number') return val;
              if (typeof val === 'string') {
                const parsed = new Date(val.replace(/[-\/]/g, '/')).getTime();
                return isNaN(parsed) ? 0 : parsed;
              }
              if (val instanceof Date) return val.getTime();
              if (val.toDate && typeof val.toDate === 'function') return val.toDate().getTime();
              if (val.seconds) return val.seconds * 1000;
              const fallback = new Date(val).getTime();
              return isNaN(fallback) ? 0 : fallback;
           } catch (e) { return 0; }
         };
         booksData.sort((a, b) => getTimestamp(b.pubDate) - getTimestamp(a.pubDate));
         setBooks(booksData);
         setLoading(false);
       }, err => { console.error("Books Error:", err); setLoading(false); });
 
       const wishlistRef = collection(db, 'artifacts', appId, 'public', 'data', 'wishlists');
       const unsubscribeWishlist = onSnapshot(wishlistRef, (snapshot) => {
         const wishData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
         wishData.sort((a, b) => b.createdAt - a.createdAt);
         setWishlists(wishData);
       }, err => console.error("Wishlist Error:", err));
 
       const inventoryRef = doc(db, 'artifacts', appId, 'public', 'data', 'system', 'inventory');
       const unsubscribeInventory = onSnapshot(inventoryRef, (docSnap) => {
         if (docSnap.exists() && docSnap.data().dict) {
           setInventoryDict(docSnap.data().dict);
           if (docSnap.data().lastUpdated) setInventoryLastUpdated(docSnap.data().lastUpdated);
         }
       }, err => console.error("Inventory Error:", err));
 
       return () => { unsubStats(); unsubscribeBooks(); unsubscribeWishlist(); unsubscribeInventory(); };
     }, [user]);
 
     const handleGoogleLogin = async () => {
       const provider = new GoogleAuthProvider();
       try { 
         await signInWithPopup(auth, provider); 
       } catch (error) { 
         console.error(error);
         if (error.code === 'auth/unauthorized-domain' || error.message.includes('blocked')) {
           showMessage("登入失敗：未授權的網域。\n請至 Firebase 後台加入此網站網址。", "登入錯誤");
         } else if (error.message.includes('invalid')) {
           showMessage("登入失敗：無效的操作。\n請確認您的 Firebase 後台是否已經啟用 Google 登入選項！", "登入錯誤");
         } else { showMessage(`登入失敗 (${error.code})，請稍後再試！`, "登入錯誤"); }
       }
     };
 
     const handleLogout = async () => {
       try { await signOut(auth); } catch (error) { console.error(error); }
     };
 
     // 💖 共用投票處理核心 
     const handleVote = async (item, collectionName) => {
       if (!user || user.isAnonymous) return showMessage("請先使用 Google 帳號登入才能投票集氣唷！", "需要登入");
       
       const currentVotes = item.votes || [];
       const hasVoted = currentVotes.includes(user.uid);
       
       const isViped = collectionName === 'books' ? (item.vipRequests && item.vipRequests.length > 0) : !!item.vipCode;
       const isAchieved = currentVotes.length >= 30 && isViped;
       const itemRef = doc(db, 'artifacts', appId, 'public', 'data', collectionName, item.id);
 
       if (hasVoted) {
         if (isAchieved) return showMessage("這本書已經達標囉，您的愛心已化為實體力量，無法收回！但歡迎邀請朋友繼續為它集氣！");
         await updateDoc(itemRef, { votes: arrayRemove(user.uid) });
       } else {
         if (dailyVotesCount >= 3) return showMessage("今天已經用完 3 次愛心額度囉！\n請注意，收回愛心是不會退還額度的。\n請明天再來幫喜歡的書本集氣吧！", "額度用盡");
 
         const today = new Date().toLocaleDateString('en-CA');
         const statsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'voteStats', 'daily');
         
         try { await setDoc(statsRef, { date: today, count: dailyVotesCount + 1 }, { merge: true }); } catch(e) {}
 
         const updates = { votes: arrayUnion(user.uid) };
         if (currentVotes.length === 29 && isViped && !item.achiever) {
            updates.achiever = { uid: user.uid, name: user.displayName || '熱心師生', timestamp: Date.now() };
         }
         await updateDoc(itemRef, updates);
       }
     };
 
     const handleFastPassBoost = async () => {
       if (!user || user.isAnonymous) { showMessage("請先登入才能使用快通券序號唷！", "需要登入"); setFastPassModalBook(null); return; }
       if (!fastPassInput.trim() || fastPassInput.trim().length !== 5) return showMessage("請輸入完整的 5 碼快通券序號！", "格式錯誤");
       
       const bookRef = doc(db, 'artifacts', appId, 'public', 'data', 'books', fastPassModalBook.id);
       const vipRecord = { uid: user.uid, name: user.displayName || '熱心師生', code: fastPassInput.trim().toLowerCase(), timestamp: Date.now() };
       
       const updates = { vipRequests: arrayUnion(vipRecord) };
       const currentVotes = fastPassModalBook.votes || [];
       if (currentVotes.length >= 30 && !fastPassModalBook.achiever) {
          updates.achiever = { uid: user.uid, name: user.displayName || '熱心師生', timestamp: Date.now(), isFastPass: true };
       }
 
       try {
         await updateDoc(bookRef, updates);
         showMessage("快通券啟動成功！圖書館將優先審核這本書，並為您保留首讀權限！", "啟動成功 🎉");
         setFastPassModalBook(null); setFastPassInput('');
       } catch (error) { console.error("FastPass Boost failed:", error); }
     };
 
     const handleIsbnChange = (e) => {
       const isbn = e.target.value.replace(/[^0-9Xx]/g, '');
       setWishFormData({ ...wishFormData, isbn });
       if (isbn.length >= 10) {
         setInventoryCheckResult('checking');
         setTimeout(() => {
           const count = inventoryDict[isbn];
           if (count && count > 0) { setInventoryCount(count); setInventoryCheckResult('found'); } 
           else { setInventoryCheckResult('clear'); }
         }, 300);
       } else { setInventoryCheckResult(null); }
     };
 
     const submitWishlist = async (e) => {
       e.preventDefault();
       if (!user || user.isAnonymous) return showMessage("請先使用 Google 帳號登入才能許願唷！", "需要登入");
       if (!wishFormData.title) return showMessage("請填寫書名");
       if (inventoryCheckResult === 'found' && !wishFormData.duplicateReason) return showMessage("館內已有此書，請填寫重複採購原因！");
       try {
         const wishlistRef = collection(db, 'artifacts', appId, 'public', 'data', 'wishlists');
         await addDoc(wishlistRef, {
           title: wishFormData.title, isbn: wishFormData.isbn, reason: wishFormData.reason,
           duplicateReason: wishFormData.duplicateReason, vipCode: wishFormData.vipCode.trim().toLowerCase(),
           status: 'pending', userId: user.uid, userName: user.displayName || '熱心師生', createdAt: Date.now(), votes: []
         });
         
         const hasVip = wishFormData.vipCode;
         setWishFormData({ title: '', isbn: '', reason: '', duplicateReason: '', vipCode: '' });
         setInventoryCheckResult(null);
         showMessage("許願成功！\n" + (hasVip ? "已為您掛上快通券申請，趕快邀請同學幫忙按愛心吧！" : "趕快邀請同學幫忙按愛心集氣吧！"), "大成功 🎉");
       } catch (error) { console.error("Error submitting wishlist:", error); }
     };

     const filteredBooks = books.filter(book => {
       if (filterType === 'all') return true;
       if (book.category !== filterType) return false;
       if (filterKeyword !== 'all' && book.keyword !== filterKeyword) return false;
       return true;
     });
 
     const achievedBooks = filteredBooks.filter(book => (book.votes?.length || 0) >= 30 && (book.vipRequests?.length || 0) >= 1);
      const regularBooks = filteredBooks.filter(book => !((book.votes?.length || 0) >= 30 && (book.vipRequests?.length || 0) >= 1));
 
     const achievedWishlists = wishlists.filter(wish => (wish.votes?.length || 0) >= 30 && !!wish.vipCode);
     const regularWishlists = wishlists.filter(wish => !((wish.votes?.length || 0) >= 30 && !!wish.vipCode));
 
     const safeFormatDate = (dateVal) => {
       if (!dateVal) return "未知日期";
       try {
         if (typeof dateVal === 'string') return dateVal;
         if (typeof dateVal === 'number') {
           const d = new Date(dateVal);
           return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
         }
         if (dateVal.toDate && typeof dateVal.toDate === 'function') {
           const d = dateVal.toDate();
           return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
         }
         if (dateVal instanceof Date) {
           return `${dateVal.getFullYear()}-${String(dateVal.getMonth()+1).padStart(2,'0')}-${String(dateVal.getDate()).padStart(2,'0')}`;
         }
         return String(dateVal);
       } catch (e) { return "未知日期"; }
     };
 
     const invDateStr = inventoryLastUpdated ? 
       (() => { const d = new Date(inventoryLastUpdated); return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`; })() 
       : '';
 
     // 動態計算最新出版範圍
     let autoStartDateStr = "2025/09/02";
     let autoEndDateStr = "近期";
     if (books.length > 0) {
       const times = books.map(b => {
          if (b.createdAt?.toDate && typeof b.createdAt.toDate === 'function') return b.createdAt.toDate().getTime();
          if (b.createdAt?.seconds) return b.createdAt.seconds * 1000;
          if (typeof b.createdAt === 'number') return b.createdAt;
          if (typeof b.createdAt === 'string') return new Date(b.createdAt).getTime();
          if (b.createdAt instanceof Date) return b.createdAt.getTime();
          return 0;
       }).filter(t => t > 0 && !isNaN(t));
       if (times.length > 0) {
          const maxT = new Date(Math.max(...times));
          autoEndDateStr = `${maxT.getFullYear()}/${String(maxT.getMonth()+1).padStart(2,'0')}/${String(maxT.getDate()).padStart(2,'0')}`;
       }
     }
 
     // 🎯 共用：達標狀態與推手表彰渲染器
     const renderAchievementStatus = (isViped, votesCount, vipProviderName, achieverName) => {
        if (isViped && votesCount >= 30) {
           return (
               <div className="bg-gradient-to-r from-rose-50 to-amber-50 border border-rose-100 p-3 rounded-xl mb-4 text-xs space-y-2 shadow-sm animate-in zoom-in-95">
                  <div className="flex items-center gap-2 text-amber-700 font-extrabold"><Icon name="ticket" className="w-4 h-4"/> 快通提供：{maskName(vipProviderName)}</div>
                  <div className="flex items-center gap-2 text-rose-600 font-extrabold"><Icon name="party-popper" className="w-4 h-4"/> 達標推手：{maskName(achieverName)}</div>
               </div>
           );
        } else if (isViped && votesCount < 30) {
           return (
               <div className="bg-amber-50 border border-amber-100 p-3 rounded-xl mb-4 text-xs space-y-2 shadow-sm">
                  <div className="flex items-center gap-2 text-amber-700 font-extrabold"><Icon name="ticket" className="w-4 h-4"/> 快通提供：{maskName(vipProviderName)}</div>
                  <div className="flex items-center gap-2 text-rose-500 font-extrabold">
                    <Icon name="heart" className="w-4 h-4" fill="currentColor" strokeWidth={0}/> 
                    尚缺 <span className="text-lg mx-1">{30 - votesCount}</span> 個愛心達標！
                 </div>
               </div>
           );
        } else if (!isViped && votesCount >= 30) {
           return (
               <div className="bg-blue-50 border border-blue-100 p-3 rounded-xl mb-4 text-xs space-y-2 shadow-sm">
                  <div className="flex items-center gap-2 text-blue-700 font-extrabold">
                    <Icon name="info" className="w-4 h-4"/> 愛心已滿 30，僅差一張「快通券」即可達標保送！
                  </div>
               </div>
           );
        }
        return null;
     };
 
     // 📚 書籍卡片元件
     const renderBookCard = (book) => {
       const votesCount = book.votes ? book.votes.length : 0;
       const hasVoted = book.votes && user && book.votes.includes(user.uid);
       const isViped = book.vipRequests && book.vipRequests.length > 0; 
       const isAchieved = votesCount >= 30 && isViped;
 
       return (
         <div key={book.id} className={`group bg-white rounded-3xl shadow-sm border overflow-hidden flex flex-col transition-all duration-300 hover:shadow-2xl hover:-translate-y-1.5 ${isAchieved ? 'border-rose-300 ring-4 ring-rose-100/60' : isViped ? 'border-amber-300 ring-4 ring-amber-100/60' : 'border-slate-200 hover:border-indigo-300'}`}>
           <div className="h-64 bg-gradient-to-br from-slate-100 via-slate-50 to-slate-200 flex items-center justify-center relative border-b border-slate-100 overflow-hidden">
               <div className="absolute top-3 left-3 flex flex-col gap-2 items-start z-10">
                  <span className={`px-3 py-1 text-xs font-bold rounded-lg shadow-md backdrop-blur-md border border-white/20 tracking-wide ${book.category === '套書續集' ? 'bg-blue-600/90 text-white' : 'bg-emerald-600/90 text-white'}`}>
                    {book.keyword || book.category}
                  </span>
                  {book.hasBopomofo === '有注音' && (
                    <span className="px-3 py-1 text-xs font-extrabold rounded-lg shadow-md bg-amber-400/95 text-amber-950 backdrop-blur-md border border-white/30">有注音</span>
                  )}
               </div>
               
               {isAchieved ? (
                 <div className="absolute top-3 right-3 z-10 bg-gradient-to-br from-rose-500 to-rose-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg shadow-lg flex items-center gap-1.5 border border-rose-400/50">
                    <Icon name="award" className="w-3.5 h-3.5" /> 達標保送
                 </div>
               ) : isViped && (
                  <div className="absolute top-3 right-3 z-10 bg-gradient-to-br from-amber-400 to-amber-500 text-white text-xs font-bold px-3 py-1.5 rounded-lg shadow-lg flex items-center gap-1.5 border border-amber-300/50">
                    <Icon name="ticket-check" className="w-3.5 h-3.5" /> 已用快通券
                  </div>
               )}
               
               {book.coverUrl ? 
                  <img src={book.coverUrl} alt="封面" className="w-full h-full object-contain bg-white p-4 drop-shadow-md group-hover:scale-105 transition-transform duration-500" loading="lazy"/> : 
                  <div className="flex flex-col items-center gap-3 text-slate-300">
                    <Icon name="image-off" className="w-12 h-12" />
                    <span className="text-xs font-bold tracking-widest uppercase">無封面</span>
                  </div>
               }
           </div>
           
           <div className="p-6 flex-grow flex flex-col bg-white relative">
              <h3 className="font-bold text-lg text-slate-800 mb-2 line-clamp-2 leading-snug group-hover:text-indigo-600 transition-colors">{book.title}</h3>
              <p className="text-sm text-slate-500 mb-4 font-medium flex items-center gap-2">
                <Icon name="pen-tool" className="w-4 h-4 flex-shrink-0 text-slate-400" />
                <span className="truncate">{book.author || '作者未知'}{book.publisher ? ` / ${book.publisher}` : ''}</span>
              </p>
              
              {renderAchievementStatus(isViped, votesCount, book.vipRequests?.[0]?.name, book.achiever?.name)}
 
              <div className="text-xs text-slate-600 mb-6 space-y-2.5 bg-slate-50/80 p-4 rounded-2xl border border-slate-100 mt-auto">
                <p className="flex justify-between items-center gap-3"><span className="flex items-center gap-1.5 text-slate-400"><Icon name="calendar-days" className="w-4 h-4"/> 出版</span><span className="font-bold text-slate-700 text-right">{safeFormatDate(book.pubDate)}</span></p>
                <p className="flex justify-between items-center gap-3"><span className="flex items-center gap-1.5 text-slate-400"><Icon name="barcode" className="w-4 h-4"/> ISBN</span><span className="font-mono text-slate-700 font-medium text-right break-all">{book.isbn || '—'}</span></p>
                <p className="flex justify-between items-center gap-3"><span className="flex items-center gap-1.5 text-slate-400"><Icon name="circle-dollar-sign" className="w-4 h-4"/> 定價</span><span className="font-bold text-slate-700 text-right">{book.price ? `${Number(book.price) || 0} 元` : '—'}</span></p>
                <p className="flex justify-between items-center gap-3"><span className="flex items-center gap-1.5 text-slate-400"><Icon name="badge-info" className="w-4 h-4"/> 注音</span><span className="font-bold text-slate-700 text-right">{book.hasBopomofo || '未標示'}</span></p>
                <p className="flex justify-between items-center gap-3"><span className="flex items-center gap-1.5 text-slate-400"><Icon name="building-2" className="w-4 h-4"/> 出版社</span><span className="font-bold text-slate-700 text-right">{book.publisher || '未標示'}</span></p>
              </div>
              
              <div className="flex items-center justify-between gap-3 border-t border-slate-100 pt-4">
                <div className="flex items-center flex-shrink-0">
                  {book.status === 'purchased' ? 
                    <div className="text-xs font-bold text-emerald-700 bg-emerald-50 border border-emerald-200 px-3 py-2 rounded-xl flex items-center gap-2 shadow-sm"><Icon name="check-circle-2" className="w-4 h-4"/> <span>{book.statusNote || '已採購'}</span></div>
                   : book.status === 'processing' ? 
                    <div className="text-xs font-bold text-blue-700 bg-blue-50 border border-blue-200 px-3 py-2 rounded-xl flex items-center gap-2 shadow-sm"><Icon name="clock" className="w-4 h-4"/> <span>{book.statusNote || '處理中'}</span></div>
                   : 
                    <button onClick={() => setFastPassModalBook(book)} title="輸入快通券序號，直接給予保送特權！" className="text-xs font-bold text-amber-700 bg-amber-50 border border-amber-200 px-3 py-2 rounded-xl hover:bg-amber-100 hover:shadow-md transition-all flex items-center gap-2 shadow-sm group/vip">
                      <Icon name="ticket" className="w-4 h-4 group-hover/vip:rotate-12 transition-transform" /> 
                      {isViped ? '已用快通' : '使用快通'}
                    </button>
                  }
                </div>
                <button 
                  onClick={() => handleVote(book, 'books')} 
                  title="點擊愛心集氣！"
                  className={`flex-shrink-0 flex items-center gap-2 px-4 py-2.5 rounded-full text-sm font-bold transition-all duration-300 shadow-sm ${hasVoted ? 'bg-rose-500 text-white shadow-rose-200 shadow-md scale-105 hover:bg-rose-600' : 'bg-rose-50 border border-rose-200 text-rose-500 hover:bg-rose-100 hover:scale-105'}`}
                >
                  <Icon name="heart" className={`w-4 h-4 transition-transform duration-300 ${hasVoted ? 'scale-110' : ''}`} fill={hasVoted ? "currentColor" : "none"} strokeWidth={hasVoted ? 0 : 2} /> 
                  <span className={hasVoted ? "text-white" : ""}>{votesCount}</span>
                </button>
              </div>
           </div>
         </div>
       );
     };
 
     // 📝 許願單卡片元件
     const renderWishlistCard = (wish) => {
       const votesCount = wish.votes ? wish.votes.length : 0;
       const hasVoted = wish.votes && user && wish.votes.includes(user.uid);
       const isViped = !!wish.vipCode; 
       const isAchieved = votesCount >= 30 && isViped;
 
       return (
         <div key={wish.id} className={`bg-white p-6 sm:p-7 rounded-3xl shadow-sm border transition-all duration-300 hover:shadow-xl hover:-translate-y-1 flex flex-col ${isAchieved ? 'border-rose-300 ring-4 ring-rose-100/60' : isViped ? 'border-amber-300 ring-4 ring-amber-100/60' : 'border-slate-200 hover:border-indigo-200'}`}>
           <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4">
              <h3 className="font-bold text-slate-800 text-lg leading-snug flex items-center flex-wrap gap-2.5">
                {wish.title}
                {isAchieved ? (
                   <span className="text-xs bg-gradient-to-r from-rose-500 to-rose-600 text-white px-2.5 py-1 rounded-lg font-bold shadow-sm flex items-center gap-1.5"><Icon name="award" className="w-3.5 h-3.5"/> 達標保送</span>
                ) : isViped && (
                   <span className="text-xs bg-gradient-to-r from-amber-400 to-amber-500 text-white px-2.5 py-1 rounded-lg font-bold shadow-sm flex items-center gap-1.5"><Icon name="ticket" className="w-3.5 h-3.5"/> 具備快通</span>
                )}
              </h3>
              <span className={`whitespace-nowrap px-3.5 py-1.5 text-xs font-bold rounded-lg shadow-sm border ${wish.status === 'purchased' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : wish.status === 'rejected' ? 'bg-rose-50 text-rose-700 border-rose-200' : 'bg-slate-50 text-slate-600 border-slate-200'}`}>
                {wish.status === 'pending' ? '審核中' : wish.status === 'purchased' ? '已買到囉' : wish.status}
              </span>
           </div>
           
           <div className="flex flex-wrap items-center gap-x-5 gap-y-3 mb-4 text-sm font-medium text-slate-500">
              <span className="flex items-center gap-2"><Icon name="user" className="w-4 h-4 text-slate-400"/> {maskName(wish.userName)} 許願</span>
              {wish.isbn && <span className="flex items-center gap-2 bg-slate-100 px-2.5 py-1 rounded-lg text-slate-600"><Icon name="barcode" className="w-4 h-4 text-slate-400"/> {wish.isbn}</span>}
           </div>
           
           {renderAchievementStatus(isViped, votesCount, wish.userName, wish.achiever?.name)}
           
           {wish.duplicateReason && (
              <div className="mb-4 text-sm bg-rose-50 text-rose-800 p-4 rounded-2xl border border-rose-100 flex items-start gap-2.5">
                <Icon name="alert-circle" className="w-5 h-5 flex-shrink-0 mt-0.5 text-rose-500" />
                <div className="leading-relaxed"><span className="font-bold">重複申請原因：</span>{wish.duplicateReason}</div>
             </div>
           )}
 
           {wish.reason && (
              <div className="bg-slate-50/80 border border-slate-100 p-4 rounded-2xl mb-5 text-slate-700 text-sm leading-relaxed shadow-inner min-h-[80px] flex items-start gap-2.5">
                <Icon name="quote" className="w-5 h-5 flex-shrink-0 text-indigo-300 mt-0.5" />
                <span>{wish.reason}</span>
              </div>
           )}
           
           <div className="mt-auto pt-4 border-t border-slate-100 flex justify-between items-center gap-4">
              {wish.vipCode && (
                 <div className="text-xs font-bold text-amber-700 bg-amber-50 border border-amber-200 px-3 py-2 rounded-xl flex items-center gap-2 shadow-sm">
                    <Icon name="ticket" className="w-4 h-4"/> 快通券已附上
                 </div>
              )}
              <button 
                onClick={() => handleVote(wish, 'wishlists')} 
                title="幫這本書按愛心，幫助它達標！"
                className={`ml-auto flex items-center gap-2 px-4 py-2.5 rounded-full text-sm font-bold transition-all duration-300 shadow-sm ${hasVoted ? 'bg-rose-500 text-white shadow-rose-200 shadow-md scale-105 hover:bg-rose-600' : 'bg-rose-50 border border-rose-200 text-rose-500 hover:bg-rose-100 hover:scale-105'}`}
              >
                <Icon name="heart" className={`w-4 h-4 ${hasVoted ? 'scale-110' : ''} transition-transform`} fill={hasVoted ? "currentColor" : "none"} strokeWidth={hasVoted ? 0 : 2} /> 
                <span>{votesCount}</span>
              </button>
           </div>
         </div>
       );
     };
 
     if (loading) {
       return (
         <div className="min-h-screen flex items-center justify-center bg-slate-50">
           <div className="text-center">
             <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-50 mb-4">
                <Icon name="loader-2" className="w-8 h-8 animate-spin text-indigo-600" />
              </div>
              <p className="text-slate-600 font-extrabold">載入圖書資料中...</p>
           </div>
         </div>
       );
     }
 
     return (
       <div className="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100">
         {/* 全域訊息提示 Modal (取代 alert) */}
         {modalContent && (
            <div className="fixed inset-0 z-[60] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in duration-200">
              <div className="bg-white rounded-3xl shadow-2xl max-w-sm w-full overflow-hidden animate-in zoom-in-95">
                <div className="p-6 text-center border-b border-slate-100">
                  <div className="inline-flex items-center justify-center w-12 h-12 rounded-full bg-indigo-50 text-indigo-600 mb-4">
                    <Icon name="bell" className="w-6 h-6" />
                  </div>
                  <h3 className="text-lg font-black text-slate-900 mb-2">{modalContent.title}</h3>
                  <p className="text-slate-600 font-medium whitespace-pre-wrap leading-relaxed text-sm">
                    {modalContent.message}
                  </p>
                </div>
                <div className="p-4 bg-slate-50">
                  <button 
                    onClick={() => setModalContent(null)}
                    className="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition-colors"
                  >
                    我知道了
                  </button>
                </div>
              </div>
            </div>
         )}

         {/* Fast Pass Modal */}
         {fastPassModalBook && (
           <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in">
              <div className="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md border border-slate-200 animate-in zoom-in-95">
                <div className="flex justify-between items-center mb-6">
                  <div>
                    <h3 className="text-2xl font-extrabold text-slate-800 flex items-center gap-3"><div className="bg-amber-100 text-amber-600 p-2.5 rounded-2xl"><Icon name="ticket" className="w-6 h-6" /></div> 啟動優先快通</h3>
                    <p className="text-sm text-slate-500 mt-3 font-medium leading-relaxed">
                      為 <span className="font-bold text-indigo-600">《{fastPassModalBook.title}》</span> 輸入 5 碼快通券序號，啟動保送特權！
                    </p>
                  </div>
                  <button onClick={() => { setFastPassModalBook(null); setFastPassInput(''); }} className="text-slate-400 hover:text-slate-700 p-2 rounded-full hover:bg-slate-100 transition-colors"><Icon name="x" className="w-5 h-5" /></button>
                </div>
                <div className="bg-amber-50 border border-amber-200 rounded-2xl p-5 mb-6 shadow-inner">
                  <label className="block text-sm font-bold text-amber-800 mb-3 flex items-center gap-2"><Icon name="key-round" className="w-4 h-4" /> 請輸入您的快通券代碼：</label>
                  <input
                    type="text"
                    value={fastPassInput}
                    onChange={(e) => setFastPassInput(e.target.value)}
                    maxLength={5}
                    className="w-full px-4 py-4 border-2 border-amber-300 rounded-xl focus:ring-4 focus:ring-amber-100 focus:border-amber-500 outline-none font-mono text-center text-2xl uppercase tracking-[0.5em] transition-all bg-white shadow-sm text-amber-900 font-bold"
                   placeholder="XXXXX"
                  />
                </div>
             <div className="flex gap-4">
                  <button onClick={() => { setFastPassModalBook(null); setFastPassInput(''); }} className="flex-1 py-3.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold transition-all">取消</button>
                  <button onClick={handleFastPassBoost} className="flex-1 py-3.5 rounded-xl bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-white font-extrabold shadow-lg shadow-amber-200 transition-all active:scale-95"><Icon name="sparkles" className="w-5 h-5" /> 送出保送</button>
                </div>
              </div>
           </div>
         )}
         {/* Header */}
         <header className="bg-white/80 backdrop-blur-lg shadow-sm sticky top-0 z-40 border-b border-slate-200/50">
           <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center h-16 sm:h-20">
                <div className="flex items-center gap-3">
                  <div className="bg-gradient-to-br from-indigo-500 to-blue-600 p-2.5 rounded-xl shadow-sm text-white"><Icon name="library" className="w-6 h-6" /></div>
                  <div>
                    <h1 className="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-900 to-slate-800 tracking-tight hidden sm:block">海佃國小地下圖書室</h1>
                    <h1 className="text-lg font-bold text-slate-800 sm:hidden">採購與許願網</h1>
                  </div>
                </div>
                
                <div className="flex items-center gap-4">
                  {user && !user.isAnonymous ? (
                    <div className="flex items-center gap-3">
                      {/* 愛心額度顯示 */}
                      <div className="hidden sm:flex items-center gap-1.5 bg-rose-50 border border-rose-100 pl-2.5 pr-3 py-1.5 rounded-full shadow-sm text-rose-600" title="每個帳號一天有 3 次愛心集氣機會">
                       <Icon name="heart" className="w-4 h-4" fill="currentColor" strokeWidth={0}/>
                        <span className="text-xs font-extrabold tracking-wide">額度: {Math.max(0, 3 - dailyVotesCount)}/3</span>
                      </div>
                     
                      <div className="hidden sm:flex items-center gap-2.5 bg-slate-100/80 border border-slate-200 pl-1.5 pr-4 py-1.5 rounded-full shadow-sm">
                        {user.photoURL ? <img src={user.photoURL} alt="avatar" className="w-7 h-7 rounded-full shadow-sm" /> : <div className="w-7 h-7 rounded-full bg-indigo-200 flex items-center justify-center"><Icon name="user" className="w-4 h-4 text-indigo-700" /></div>}
                        <span className="text-sm font-bold text-slate-700 truncate max-w-[120px]">{user.displayName}</span>
                      </div>
                      <button onClick={handleLogout} className="text-sm text-slate-500 hover:text-rose-600 font-bold flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-rose-50 transition-all"><Icon name="log-out" className="w-4 h-4" /> <span className="hidden sm:block">登出</span></button>
                    </div>
                  ) : (
                    <div className="flex items-center gap-4">
                      <span className="text-sm font-bold text-slate-400 hidden sm:inline-block tracking-wide">訪客瀏覽中</span>
                      <button onClick={handleGoogleLogin} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-md shadow-indigo-200 transition-all hover:shadow-lg active:scale-95"><Icon name="log-in" className="w-4 h-4" /> Google 登入</button>
                    </div>
                  )}
                </div>
              </div>
           </div>
         </header>
 
         {/* Navigation (排序：新書 -> 許願單 -> 心願達成) */}
         <div className="bg-white/80 backdrop-blur-md border-b border-slate-200/60 shadow-sm mb-10 sticky top-16 sm:top-20 z-30">
           <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
              <nav className="flex space-x-6 sm:space-x-10 overflow-x-auto whitespace-nowrap hide-scrollbar px-1">
                <button onClick={() => setActiveTab('new-books')} className={`py-5 px-1 text-sm font-bold border-b-[3px] transition-all flex items-center gap-2 ${activeTab === 'new-books' ? 'border-indigo-600 text-indigo-700' : 'border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-50/50'}`}>
                  <Icon name="book-open" className="w-4 h-4" /> 新書推薦
                </button>
                <button onClick={() => setActiveTab('wishlist')} className={`py-5 px-1 text-sm font-bold border-b-[3px] transition-all flex items-center gap-2 ${activeTab === 'wishlist' ? 'border-indigo-600 text-indigo-700' : 'border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-50/50'}`}>
                  <Icon name="pen-tool" className="w-4 h-4" /> 填寫許願單
                </button>
                <button onClick={() => setActiveTab('achieved')} className={`py-5 px-1 text-sm font-bold border-b-[3px] transition-all flex items-center gap-2 ${activeTab === 'achieved' ? 'border-rose-500 text-rose-600' : 'border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-50/50'}`}>
                  <Icon name="target" className="w-4 h-4" /> 心願達成區
                  {(achievedBooks.length + achievedWishlists.length) > 0 && <span className="bg-rose-100 text-rose-700 px-2 py-0.5 rounded-full text-xs ml-1 shadow-sm border border-rose-200/50">{achievedBooks.length + achievedWishlists.length}</span>}
                </button>
              </nav>
           </div>
         </div>
 
         <main className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">

              <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div className="bg-gradient-to-r from-indigo-50 via-white to-blue-50 border border-indigo-100 rounded-3xl p-8 shadow-sm flex flex-col sm:flex-row items-start gap-6 relative overflow-hidden">
                  <div className="absolute right-0 top-0 opacity-5 pointer-events-none"><Icon name="library" className="w-64 h-64 -mt-10 -mr-10" /></div>
                  <div className="bg-white p-3 rounded-2xl shadow-sm text-indigo-600 flex-shrink-0 z-10 border border-indigo-50"><Icon name="lightbulb" className="w-8 h-8" /></div>
                  <div className="z-10">
                    <h2 className="text-xl font-extrabold text-indigo-900 mb-3 tracking-wide">歡迎來到新書推薦集氣區！</h2>
                    <p className="text-slate-700 leading-relaxed text-sm sm:text-base font-medium mb-3">這裡為大家整理了由 <span className="font-bold text-indigo-600">{autoStartDateStr}</span>至 <span className="font-bold text-indigo-600">{autoEndDateStr}</span> 的焦點作家和熱門套書。登入後即可為喜歡的書集氣，每天有 3 次額度喔！</p>
                    <div className="bg-indigo-100/50 border border-indigo-100 rounded-xl p-3 inline-block">
                      <p className="text-sm text-indigo-900 font-bold flex items-center flex-wrap gap-2">
                        <Icon name="info" className="w-4 h-4 text-indigo-600" />
                        <span>集氣規則：累積滿 <span className="text-rose-600 bg-white px-2 py-0.5 rounded shadow-sm">30 個愛心</span> 且有讀者使用 <span className="text-amber-600 bg-white px-2 py-0.5 rounded shadow-sm flex items-center gap-1 inline-flex"><Icon name="ticket" className="w-3 h-3"/> 快通券</span> 保送，將移入【心願達成區】優先採購！</span>
                      </p>
                    </div>
                  </div>
                </div>
 
                <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col sm:flex-row gap-4 items-center justify-between">
                  <div className="flex flex-col sm:flex-row items-center gap-4 w-full sm:w-auto">
                    <div className="flex items-center gap-2 text-slate-500 font-bold whitespace-nowrap bg-slate-50 px-3 py-2 rounded-lg"><Icon name="list-filter" className="w-4 h-4" /> 篩選書籍</div>
                    <select className="w-full sm:w-auto px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-bold text-slate-700 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-slate-50 outline-none transition-all hover:border-slate-300" value={filterType} onChange={(e) => { setFilterType(e.target.value); setFilterKeyword('all'); }}>
                      <option value="all">顯示全部分類</option>
                      <option value="特定作家">特定作家</option>
                     <option value="套書續集">特定套書</option>
                    </select>
                    {filterType !== 'all' && (
                      <select className="w-full sm:w-auto px-4 py-2.5 border border-slate-200 rounded-xl text-sm font-bold text-slate-700 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-slate-50 outline-none transition-all hover:border-slate-300 animate-in zoom-in-95" value={filterKeyword} onChange={(e) => setFilterKeyword(e.target.value)}>
                        <option value="all">顯示所有項目</option>
                        {(filterType === '特定作家' ? AUTHORS : SERIES).map(item => <option key={item} value={item}>{item}</option>)}
                      </select>
                    )}
                  </div>
               </div>
 
                {regularBooks.length === 0 ? (
                  <div className="flex flex-col items-center justify-center py-24 text-slate-400 bg-white rounded-3xl border border-dashed border-slate-200 shadow-sm">
                    <Icon name="search-x" className="w-16 h-16 mb-4 text-slate-200" />
                    <p className="font-bold text-lg text-slate-500">目前沒有找到符合的待集氣書單</p>
                  </div>
                ) : (
                  <div>
                   <h3 className="text-xl font-extrabold text-slate-700 mb-6 flex items-center gap-2 ml-1"><Icon name="book-dashed" className="w-5 h-5 text-slate-400" /> 待集氣清單</h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 xl:gap-8">
                     {regularBooks.map(renderBookCard)}
                    </div>
                  </div>
                )}
              </div>
           )}
           {/* 分頁 2: 填寫許願單 */}
           {activeTab === 'wishlist' && (
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div className="lg:col-span-5 xl:col-span-4">
                  <div className="bg-white p-6 sm:p-8 rounded-3xl shadow-sm border border-slate-200 sticky top-36">
                    <h2 className="text-xl font-extrabold text-slate-800 mb-6 flex items-center gap-3"><div className="bg-indigo-100 p-2 rounded-xl text-indigo-600"><Icon name="edit-3" className="w-5 h-5" /></div> 提交許願書單</h2>
                    
                    {(!user || user.isAnonymous) && (
                      <div className="mb-6 p-4 bg-amber-50 text-amber-800 text-sm font-bold rounded-2xl border border-amber-200 flex items-start gap-3 shadow-sm"><Icon name="info" className="w-5 h-5 flex-shrink-0 text-amber-600"/>請先點擊右上角「Google 登入」再填寫唷！</div>
                    )}
                    
                    <form onSubmit={submitWishlist} className="space-y-6">
                      <div>
                        <label className="block text-sm font-bold text-slate-700 mb-2">書籍名稱 <span className="text-rose-500">*</span></label>
                        <input type="text" required disabled={!user || user.isAnonymous} className="w-full px-4 py-3.5 border-2 border-slate-200 rounded-xl disabled:bg-slate-50 disabled:text-slate-400 focus:ring-4 focus:ring-indigo-50 focus:border-indigo-500 outline-none transition-all font-medium text-slate-700" value={wishFormData.title} onChange={(e) => setWishFormData({...wishFormData, title: e.target.value})} placeholder="請輸入完整書名" />
                      </div>
                      
                      <div>
                        <label className="block text-sm font-bold text-slate-700 mb-2">ISBN 國際標準書號{invDateStr && <span className="font-semibold text-slate-400 text-xs ml-2">(庫存基準：{invDateStr})</span>}</label>
                        <input type="text" disabled={!user || user.isAnonymous} className="w-full px-4 py-3.5 border-2 border-slate-200 rounded-xl disabled:bg-slate-50 disabled:text-slate-400 focus:ring-4 focus:ring-indigo-50 focus:border-indigo-500 outline-none font-mono text-slate-700 transition-all tracking-wider" value={wishFormData.isbn} onChange={handleIsbnChange} placeholder="輸入自動比對館藏" />
                        {inventoryCheckResult === 'checking' && <p className="text-xs text-blue-600 mt-2.5 flex items-center gap-1.5 font-bold"><Icon name="loader-2" className="w-4 h-4 animate-spin text-blue-600"/> 比對館藏系統中...</p>}
                        {inventoryCheckResult === 'clear' && <p className="text-xs text-emerald-600 mt-2.5 flex items-center gap-1.5 font-bold"><Icon name="check-circle-2" className="w-4 h-4 text-emerald-600"/> 館內無此書，歡迎許願！</p>}
                        {inventoryCheckResult === 'found' && (
                          <div className="mt-3 p-4 bg-amber-50 border border-amber-200 rounded-xl text-sm text-amber-800 shadow-sm animate-in zoom-in-95">
                            <p className="font-extrabold flex items-center gap-2 mb-1.5"><Icon name="alert-triangle" className="w-4 h-4 text-amber-600"/> 圖書館已有此書 {inventoryCount} 本！</p>
                            <p className="text-xs font-medium text-amber-700/80">若確定採購，請在下方填寫重複原因。</p>
                          </div>
                        )}
                      </div>
                      
                      {inventoryCheckResult === 'found' && (
                        <div className="animate-in fade-in slide-in-from-top-2">
                          <label className="block text-sm font-bold text-rose-700 mb-2">重複採購原因 <span className="text-rose-500">*</span></label>
                          <input type="text" required disabled={!user || user.isAnonymous} className="w-full px-4 py-3.5 border-2 border-rose-200 rounded-xl focus:ring-4 focus:ring-rose-50 focus:border-rose-500 outline-none transition-all font-medium text-slate-700" value={wishFormData.duplicateReason} onChange={(e) => setWishFormData({...wishFormData, duplicateReason: e.target.value})} placeholder="例：原書已破損掉頁" />
                        </div>
                      )}
                      
                      <div>
                        <label className="block text-sm font-bold text-slate-700 mb-2">推薦原因</label>
                        <textarea disabled={!user || user.isAnonymous} className="w-full px-4 py-4 border-2 border-slate-200 rounded-xl h-28 resize-none disabled:bg-slate-50 disabled:text-slate-400 focus:ring-4 focus:ring-indigo-50 focus:border-indigo-500 outline-none transition-all font-medium text-slate-700 leading-relaxed" value={wishFormData.reason} onChange={(e) => setWishFormData({...wishFormData, reason: e.target.value})} placeholder="為什麼想推薦這本書？" />
                      </div>
                      
                      <div className="bg-amber-50/50 p-5 rounded-2xl border border-amber-100">
                        <label className="flex items-center justify-between text-sm font-extrabold text-amber-800 mb-3"><span className="inline-flex items-center gap-2"><Icon name="ticket" className="w-4 h-4 text-amber-600" /> 優先快通券</span><span className="text-amber-600/70 font-bold text-xs">(選填)</span></label>
                        <input type="text" disabled={!user || user.isAnonymous} className="w-full px-4 py-3 border-2 border-amber-200 rounded-xl bg-white focus:outline-none focus:border-amber-500 focus:ring-4 focus:ring-amber-50 placeholder-amber-300 font-mono text-lg lowercase transition-all tracking-widest text-amber-900 font-bold" value={wishFormData.vipCode} onChange={(e) => setWishFormData({...wishFormData, vipCode: e.target.value})} placeholder="5碼序號" />
                      </div>
 
                      <button type="submit" disabled={!user || user.isAnonymous} className="w-full bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-extrabold py-4 rounded-xl hover:from-indigo-700 hover:to-blue-700 hover:shadow-lg hover:shadow-indigo-200 transition-all disabled:opacity-50 disabled:shadow-none disabled:transform-none flex items-center justify-center gap-2 active:scale-95 text-base tracking-wide"><Icon name="send" className="w-5 h-5" /> 送出許願清單</button>
                    </form>
                  </div>
                </div>
 
                <div className="lg:col-span-7 xl:col-span-8">
                  <h2 className="text-xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ml-1"><div className="bg-blue-100 p-2 rounded-xl text-blue-600"><Icon name="book-heart" className="w-5 h-5" /></div>大家的許願待集氣清單</h2>
                  <div className="space-y-5">
                    {regularWishlists.length === 0 ? (
                      <div className="flex flex-col items-center justify-center py-24 text-slate-400 bg-white rounded-3xl border border-dashed border-slate-200 shadow-sm"><Icon name="inbox" className="w-16 h-16 mb-4 text-slate-200" /><p className="font-bold text-lg text-slate-500">目前沒有待集氣的許願單喔！</p></div>
                    ) : (
                     regularWishlists.map(renderWishlistCard)
                    )}
                  </div>
                </div>
              </div>
           )}
 
           {/* 分頁 3: 🎯 心願達成區 */}
           {activeTab === 'achieved' && (
              <div className="space-y-12 animate-in zoom-in-95 fade-in duration-500">
                <div className="bg-gradient-to-r from-rose-50 via-white to-pink-50 border border-rose-200 rounded-3xl p-8 shadow-sm flex flex-col sm:flex-row items-start gap-6 relative overflow-hidden">
                  <div className="absolute right-0 top-0 opacity-5 pointer-events-none"><Icon name="target" className="w-64 h-64 -mt-10 -mr-10" /></div>
                  <div className="bg-rose-100 p-3 rounded-2xl shadow-sm text-rose-600 flex-shrink-0 z-10 border border-rose-50"><Icon name="target" className="w-8 h-8" /></div>
                  <div className="z-10">
                    <h2 className="text-xl font-extrabold text-rose-900 mb-3 tracking-wide">恭喜以下書籍達成門檻！</h2>
                    <p className="text-rose-800/80 leading-relaxed text-sm sm:text-base font-bold">這些書籍已經成功累積 <span className="text-rose-600 bg-white px-1.5 rounded shadow-sm border border-rose-100">30 個愛心</span> 並且獲得 <span className="text-amber-600 bg-white px-1.5 rounded shadow-sm border border-amber-100">快通券</span> 保送！<br/>圖書室已將它們列入最優先的採購清單，敬請期待它們上架的日子！</p>
                  </div>
                </div>
 
                {achievedBooks.length === 0 && achievedWishlists.length === 0 ? (
                  <div className="flex flex-col items-center justify-center py-24 text-slate-400 bg-white rounded-3xl border border-dashed border-slate-200 shadow-sm"><Icon name="book-open" className="w-16 h-16 mb-4 text-slate-200 opacity-70" /><p className="font-bold text-lg text-slate-500">目前還沒有書籍達成門檻，快去幫喜歡的書集氣吧！</p></div>
                ) : (
                  <div className="space-y-10">
                    {achievedBooks.length > 0 && (
                      <div>
                        <h3 className="text-xl font-extrabold text-slate-700 mb-6 flex items-center gap-2 ml-1"><Icon name="book-open" className="w-6 h-6 text-indigo-500" /> 🌟 新書推薦達標</h3>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 xl:gap-8">{achievedBooks.map(renderBookCard)}</div>
                      </div>
                    )}
                    {achievedWishlists.length > 0 && (
                      <div>
                        <h3 className="text-xl font-extrabold text-slate-700 mb-6 flex items-center gap-2 ml-1"><Icon name="pen-tool" className="w-6 h-6 text-indigo-500" /> 🌟 讀者許願達標</h3>
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 xl:gap-8">{achievedWishlists.map(renderWishlistCard)}</div>
                     </div>
                    )}
                  </div>
                )}
              </div>
           )}
         </main>
       </div>
     );
    }
 
   const root = ReactDOM.createRoot(document.getElementById("root"));
   root.render(<ErrorBoundary><App /></ErrorBoundary>);
 </script>
</body>
</html>
