        .custom-clear-icon {

        @media (max-width: 600px) { 
            :root { --panel-offset: 10px; }

            .nav-buttons { width: 100%; justify-content: space-between; gap: 8px; }

            .ios-device .volume-slider { display: none !important; }

            #sidePanel, #routePanel { top: 70px; }
            .global-player { bottom: -200px; padding: 6px 10px; }
            .global-player.active { bottom: 10px; }
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="glass-header" id="mainHeader">

            <span class="sub-title">聲音地景計畫</span>

        <div class="nav-buttons">
            <button class="btn-latest" onclick="toggleModal('latestModal')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <span class="short-text">最新</span><span class="full-text">最新動態</span>
            </button>
            <button class="btn-submit" onclick="toggleModal('submitModal')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"></path></svg>

    <div class="header-pull-tab" id="headerPullTab">

                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>

            <input type="text" class="search-input" placeholder="輸入關鍵字 (如：鳥鳴、水聲)...">
            
            <div class="panel-label" style="margin-top: 15px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                分類篩選
            </div>

                <label class="filter-item"><input type="checkbox" checked> <span class="meta-category cat-nature">自然生態</span></label>

                <label class="filter-item"><input type="checkbox" checked> <span class="meta-category cat-industry">產業聚落</span></label>

            <svg id="iconPause" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path></svg>
        </button>
        <div class="player-main">
            <div class="player-header-row">
                <div class="player-title-container">
                    <h3 class="player-title" id="playerTitle">未選擇音軌</h3>

                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <div class="modal-content">
                <h2 class="modal-title">最新動態</h2>
                <div class="latest-list">
                    <div class="latest-item" onclick="openPlayer('清晨的紅樹林與白鷺鷥')">
                        <div style="width: 64px; height: 64px; background: #cbd5e1; border-radius: 8px; flex-shrink: 0;"></div>
                        <div class="latest-item-info">
                            <div class="latest-item-title">清晨的紅樹林與白鷺鷥</div>

    <script>
        // 1. 初始化 Leaflet 地圖
        const map = L.map('map', {
            zoomControl: false, 
            attributionControl: false
        }).setView([23.033, 120.190], 14);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            maxZoom: 20
        }).addTo(map);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // 2. UI 開關邏輯
        function toggleDrawer(panelId) {
            const panel = document.getElementById(panelId);
            if (panel) panel.classList.toggle('collapsed');
        }

        function toggleModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) modal.classList.toggle('active');
        }

        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', function(e) {
                if (e.target === this) this.classList.remove('active');
            });
        });

        // 3. 🔥 解決高度遮擋：動態更新播放器高度給 CSS 變數
        function updatePlayerHeight() {
            const player = document.getElementById('globalPlayer');
            if (!player) return;

            // 只有在 active 時計算高度，關閉時歸零
            if (player.classList.contains('active')) {
                // 手機版跟電腦版的底部預留距離(Gap)微調
                const isMobile = window.innerWidth <= 600;
                const bottomGap = isMobile ? 15 : 20; 
                const totalHeight = player.offsetHeight + bottomGap;
                
                document.documentElement.style.setProperty('--player-height', totalHeight + 'px');
            } else {
                document.documentElement.style.setProperty('--player-height', '0px');
            }
        }

        // 監聽視窗變形 (如螢幕旋轉)
        window.addEventListener('resize', updatePlayerHeight);

        // 4. 播放器控制邏輯
        let isPlaying = false;
        function openPlayer(title) {
            document.getElementById('playerTitle').innerText = title;
            document.getElementById('globalPlayer').classList.add('active');
            
            // 🔥 呼叫更新高度 (加一點 setTimeout 確保 DOM 渲染取得正確尺寸)
            setTimeout(updatePlayerHeight, 50);
            
            isPlaying = false; 
            togglePlayState();
            
            // 關閉 Modal 以防重疊
            const latestModal = document.getElementById('latestModal');
            if (latestModal) latestModal.classList.remove('active');
        }

        function closePlayer() {
            document.getElementById('globalPlayer').classList.remove('active');
            
            // 🔥 關閉播放器時，將高度歸零，讓 Popup 回到原位
            updatePlayerHeight();
            
            isPlaying = true; 
            togglePlayState();
        }

        function togglePlayState() {
            isPlaying = !isPlaying;
            const playIcon = document.getElementById('iconPlay');
            const pauseIcon = document.getElementById('iconPause');
            const playBtn = document.getElementById('playBtn');
            
            if (isPlaying) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                playBtn.style.background = '#e74c3c'; 
            } else {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                playBtn.style.background = 'var(--accent-color)';
            }
        }

        // 5. 測試標記 (Marker) 與氣泡 (Popup) 生成
        const sampleMarker = L.marker([23.033, 120.190]).addTo(map);
        
        const popupHTML = `
            <div class="sound-card">
                <div style="width: 100%; height: 140px; background: #94a3b8; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">聲音照片</div>
                <div class="sound-info">
                    <h3 class="sound-title">清晨的紅樹林與白鷺鷥</h3>
                    <div class="card-meta-box">
                        <div class="meta-row">
                            <span class="meta-author-name">在地收音員</span>
                            <span class="meta-date-text">2026-04-12</span>
                        </div>
                        <div class="card-tags-row">
                            <span class="meta-category cat-nature">自然生態</span>
                        </div>
                    </div>
                    <p class="sound-desc">海佃溪沿岸的紅樹林生態豐富，清晨時分可以聽見各種水鳥的鳴叫與水波拍打聲交織的自然交響樂。</p>
                    <button class="btn-play-main" onclick="openPlayer('清晨的紅樹林與白鷺鷥')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>
                        播放聲音
                    </button>
                </div>
            </div>
        `;
        
        sampleMarker.bindPopup(popupHTML, {
            maxWidth: 320,
            minWidth: 280,
            className: 'custom-popup'
        });

    </script>
</body>
</html>
