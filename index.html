<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>海佃 溪遊記 | 聲景地圖</title>
    
    <meta name="robots" content="noindex, nofollow" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <style>
        /* 重置基本樣式 */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif; background-color: #e9ecef; }
        
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        /* 頂部懸浮導覽列 */
        .glass-header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 25px;
            z-index: 1000;
        }
        .project-title { font-size: 22px; font-weight: 800; color: #2c3e50; letter-spacing: 1.5px; margin: 0; }
        .project-title span { color: #27ae60; }
        .nav-buttons button { background: transparent; border: none; color: #34495e; font-size: 15px; font-weight: 600; margin-left: 15px; cursor: pointer; padding: 8px 12px; border-radius: 8px; transition: all 0.3s ease; }
        .nav-buttons button:hover { background: rgba(39, 174, 96, 0.1); color: #27ae60; }

        /* ========================================= */
        /* 新增：精美彈出視窗 (Modal) 樣式             */
        /* ========================================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 2000; /* 必須高於選單的 1000 */
            display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-box {
            background: white; border-radius: 20px;
            width: 90%; max-width: 450px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            transform: translateY(20px);
            transition: all 0.3s ease;
            position: relative;
        }
        .modal-overlay.active .modal-box { transform: translateY(0); }

        .modal-close-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(0,0,0,0.3); color: white;
            border: none; border-radius: 50%;
            width: 30px; height: 30px; font-size: 18px; font-weight: bold;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: background 0.3s; z-index: 10;
        }
        .modal-close-btn:hover { background: rgba(0,0,0,0.7); }

        .modal-img { width: 100%; height: 200px; object-fit: cover; }
        .modal-content { padding: 25px; text-align: justify; }
        .modal-title { font-size: 22px; color: #2c3e50; margin: 0 0 10px 0; font-weight: 800; }
        .modal-tag { display: inline-block; background: #27ae60; color: white; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-bottom: 15px; }
        .modal-text { font-size: 15px; color: #555; line-height: 1.6; margin: 0; }
        
        /* 聯絡資訊卡片特製樣式 */
        .contact-item { display: flex; align-items: center; margin-top: 15px; background: #f8f9fa; padding: 10px 15px; border-radius: 10px;}
        .contact-icon { font-size: 24px; margin-right: 15px; }

        /* ========================================= */
        /* 地圖標記彈出視窗樣式 (保留之前的設定)       */
        /* ========================================= */
        .leaflet-popup-content-wrapper { border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0; width: 300px !important; }
        .sound-card { display: flex; flex-direction: column; }
        .sound-cover { width: 100%; height: 170px; object-fit: cover; background-color: #f1f2f6; }
        .sound-info { padding: 18px; }
        .sound-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 10px; }
        .sound-category { background: #27ae60; color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sound-date { color: #7f8c8d; font-size: 12px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
        .sound-title { font-size: 19px; font-weight: bold; color: #2c3e50; margin: 0 0 5px 0; line-height: 1.3; }
        .sound-author { font-size: 13px; color: #95a5a6; margin: 0 0 10px 0; font-weight: 500; }
        .sound-desc { font-size: 14px; color: #555; margin: 0 0 15px 0; line-height: 1.5; }
        .sound-player { width: 100%; outline: none; height: 40px; border-radius: 20px; }
        .photo-badge { background: #f39c12; color: #fff; padding: 8px; border-radius: 8px; font-size: 13px; font-weight: bold; text-align: center; margin: 0; }
        .leaflet-popup-close-button { display: none; }
    </style>
</head>
<body>

    <header class="glass-header">
        <h1 class="project-title">海佃 <span>溪遊記</span></h1>
        <nav class="nav-buttons">
            <button onclick="openModal('aboutModal')">關於計畫</button>
            <button onclick="openModal('contactModal')">聯絡我們</button>
        </nav>
    </header>

    <div id="map"></div>

    <div id="aboutModal" class="modal-overlay" onclick="closeModalOnBgClick(event, 'aboutModal')">
        <div class="modal-box">
            <button class="modal-close-btn" onclick="closeModal('aboutModal')">×</button>
            <img src="https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?q=80&w=800&auto=format&fit=crop" alt="海佃溪遊記" class="modal-img">
            <div class="modal-content">
                <h2 class="modal-title">海佃 溪遊記</h2>
                <div class="modal-tag">聲景田野調查計畫</div>
                <p class="modal-text">這是一個結合鹽水溪、曾文溪與嘉南大圳的聲景採集計畫。我們帶著孩子們走入田野，放下視覺的依賴，用耳朵重新認識這片土地，記錄下屬於我們這個世代的環境聲音。</p>
            </div>
        </div>
    </div>

    <div id="contactModal" class="modal-overlay" onclick="closeModalOnBgClick(event, 'contactModal')">
        <div class="modal-box">
            <button class="modal-close-btn" onclick="closeModal('contactModal')">×</button>
            <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=800&auto=format&fit=crop" alt="聯絡我們" class="modal-img">
            <div class="modal-content">
                <h2 class="modal-title">圖書教師研究室</h2>
                <p class="modal-text">若對本計畫有任何疑問，或想參與聲景地圖的協作與推廣，歡迎與我們聯繫：</p>
                <div class="contact-item">
                    <span class="contact-icon">📍</span>
                    <div>
                        <strong>海佃國小 地下圖書室</strong><br>
                        <span style="font-size: 13px; color: #7f8c8d;">臺南市安南區</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === 彈出視窗控制邏輯 ===
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        // 點擊黑色半透明背景也能關閉視窗
        function closeModalOnBgClick(event, modalId) {
            if (event.target.id === modalId) {
                closeModal(modalId);
            }
        }

        // === 地圖與資料讀取邏輯 ===
        var map = L.map('map', { zoomControl: false }).setView([23.0485, 120.1985], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            maxZoom: 19
        }).addTo(map);

        var markerCluster = L.markerClusterGroup({
            maxClusterRadius: 40,
            disableClusteringAtZoom: 18
        });

        // 你的專屬資料庫 API
        var API_URL = "https://script.google.com/macros/s/AKfycby4WSyAF4RMSahol0m5xoJ9LmIzn7JLIkdvJVOQlXvHFIzhKouqhxxDS0bGSg4oaLiVTg/exec"; 

        fetch(API_URL)
            .then(response => response.json())
            .then(data => {
                if(data.length === 0) {
                    console.log("資料庫目前還沒有帶有座標的聲景檔案。");
                    return;
                }

                data.forEach(function(item) {
                    var audioHTML = item.audioUrl 
                        ? `<audio controls class="sound-player" src="${item.audioUrl}" controlsList="nodownload"></audio>` 
                        : `<p class="photo-badge">📷 這是生態影像，無聲音記錄</p>`;

                    var coverHTML = item.coverUrl
                        ? `<img src="${item.coverUrl}" class="sound-cover" alt="聲景封面" onerror="this.src='https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?q=80&w=600&auto=format&fit=crop'">`
                        : `<div style="height:170px; background:#bdc3c7; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:bold;">無圖片</div>`;

                    var cleanCategory = item.category.split(/[(（]/)[0].trim();

                    var cardHTML = `
                        <div class="sound-card">
                            ${coverHTML}
                            <div class="sound-info">
                                <div class="sound-meta">
                                    <span class="sound-category">${cleanCategory}</span>
                                    <span class="sound-date">${item.date}</span>
                                </div>
                                <h3 class="sound-title">${item.title}</h3>
                                <p class="sound-author">📍 採集者：${item.author}</p>
                                <p class="sound-desc">${item.description}</p>
                                ${audioHTML}
                            </div>
                        </div>
                    `;

                    var marker = L.marker([item.lat, item.lon]).bindPopup(cardHTML);
                    markerCluster.addLayer(marker);
                });

                map.addLayer(markerCluster);
            })
            .catch(error => {
                console.error("資料讀取失敗：", error);
            });
    </script>
</body>
</html>
