<!DOCTYPE html><html lang="zh-TW"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>海佃溪遊記 | 聲音地景計畫</title>
    <meta name="robots" content="noindex, nofollow" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.15.0/dist/leaflet-geoman.css" />
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.15.0/dist/leaflet-geoman.min.js"></script>

    <style>
        :root { 
            --panel-offset: 20px; 
            --accent-color: #27ae60; 
            --text-main: #2c3e50; 
            --text-muted: #7f8c8d;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 12px 32px rgba(15, 23, 42, 0.12);
            --glass-blur: blur(20px);
            --header-h: 80px;
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif; background-color: #e9ecef; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        svg { flex-shrink: 0; }

        /* 🌟 刊頭基礎 */
        .glass-header { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 950px; background: rgba(255, 255, 255, 0.85); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border-radius: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); display: flex; justify-content: space-between; align-items: center; padding: 12px 25px; z-index: 1000; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.4); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease, visibility 0s; }
        .glass-header.hidden-up { transform: translate(-50%, -150%); opacity: 0; pointer-events: none; visibility: hidden; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease, visibility 0s 0.4s; }

        .header-pull-tab { position: fixed; top: 0; left: 50%; transform: translate(-50%, -100%); background: rgba(255, 255, 255, 0.95); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid rgba(0,0,0,0.1); border-top: none; border-radius: 0 0 16px 16px; width: 100px; height: 32px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 3px; box-shadow: 0 6px 16px rgba(0,0,0,0.15); z-index: 2000; cursor: pointer; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: auto; }
        .header-pull-tab.visible { transform: translate(-50%, 0); }
        .header-pull-tab .pull-line { width: 32px; height: 4px; background: #cbd5e1; border-radius: 2px; }
        .header-pull-tab .pull-text { font-size: 10px; font-weight: 800; color: #64748b; letter-spacing: 1px; line-height: 1; }

        .project-title { font-size: 18px; font-weight: 800; color: var(--text-main); margin: 0; display: flex; align-items: baseline; flex-wrap: wrap; letter-spacing: 0.5px;}
        .project-title span.main-title { color: var(--accent-color); margin: 0 6px; }
        .project-title span.sub-title { font-size: 13px; color: var(--text-muted); font-weight: 600; margin-left: 5px; }
        
        .nav-buttons { display: flex; gap: 10px; align-items: center; }
        .nav-buttons button { background: transparent; border: none; color: #34495e; font-size: 14px; font-weight: 700; cursor: pointer; padding: 8px 14px; border-radius: 8px; transition: 0.3s; display: flex; align-items: center; gap: 6px; }
        .nav-buttons button:hover { background: rgba(39, 174, 96, 0.08); color: var(--accent-color); }
        .btn-latest { color: #d35400 !important; }
        .btn-submit { background: var(--accent-color) !important; color: white !important; border-radius: 12px !important; }

        /* 🌟 防彈面板容器 */
        .drawer-panel { position: absolute; left: var(--panel-offset); z-index: 1001; width: 320px; box-sizing: border-box; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }
        .drawer-panel.collapsed { transform: translateX(calc(-100% - var(--panel-offset) - 10px)); }
        .drawer-content { background: rgba(255, 255, 255, 0.9); backdrop-filter: var(--glass-blur); border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.5); padding: 25px; display: flex; flex-direction: column; gap: 18px; max-height: calc(100vh - 160px); overflow-y: auto; pointer-events: auto; }
        .toggle-btn { position: absolute; right: -36px; width: 36px; height: 64px; background: rgba(255, 255, 255, 0.95); border-radius: 0 16px 16px 0; border: 1px solid rgba(255,255,255,0.5); border-left: none; cursor: pointer; display: flex; justify-content: center; align-items: center; color: var(--text-main); box-shadow: 6px 0 12px rgba(0,0,0,0.06); transition: 0.2s; z-index: 1005; pointer-events: auto;}
        
        #sidePanel { top: 90px; }
        #routePanel { top: 90px; } 
        #sidePanel .toggle-btn { top: 20px; }
        #routePanel .toggle-btn { top: 90px; }

        /* 🌟 桌機版全局播放器樣式 */
        .global-player { 
            position: fixed; bottom: -200px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 850px; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); 
            border-radius: 20px; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); 
            display: grid; grid-template-columns: auto 1fr auto auto; align-items: center; padding: 12px 20px; gap: 16px; 
            z-index: 2000; transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.6);
        }
        .global-player.active { bottom: 20px; } 
        
        .player-control-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent-color); color: white; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; box-shadow: 0 4px 10px rgba(39,174,96,0.3);}
        .player-main { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
        .player-title { font-weight: 800; color: var(--text-main); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .waveform-wrapper { position: relative; width: 100%; height: 32px; border-radius: 6px; overflow: hidden; cursor: pointer; background: #f1f2f6; }
        .wave-base { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; opacity: 0.6; }
        .wave-progress { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; clip-path: inset(0 100% 0 0); }
        .volume-control { display: flex; align-items: center; gap: 8px; color: var(--text-muted); width: 130px; }
        .volume-slider { width: 100%; accent-color: var(--accent-color); cursor: pointer; height: 6px; }

        .leaflet-popup-content-wrapper { border-radius: 16px; overflow: hidden; }
        .leaflet-popup-content { margin: 0; width: 320px !important; }
        .sound-cover { width: 100%; height: 160px; object-fit: cover; }
        .card-meta-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; gap: 6px; margin: 10px 0;}

        /* 🌟 右側工具列 */
        .right-tools-wrapper { position: absolute; right: 20px; top: 90px; z-index: 1000; display: flex; flex-direction: column; align-items: flex-end; pointer-events: none; }
        .tools-toggle-btn { pointer-events: auto; width: 48px; height: 48px; background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.5)); backdrop-filter: var(--glass-blur); border-radius: 16px; display: flex; justify-content: center; align-items: center; box-shadow: var(--glass-shadow); border: 1px solid var(--glass-border); cursor: pointer; color: var(--text-main); transition: 0.3s; margin-bottom: 12px; }
        .tools-menu-container { pointer-events: auto; display: flex; flex-direction: column; align-items: flex-end; opacity: 0; visibility: hidden; transform: translateY(-10px) scale(0.95); transition: 0.3s; max-height: calc(100vh - 150px); overflow-y: auto; scrollbar-width: none; }
        .right-tools-wrapper.open .tools-menu-container { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }

        /* 🌟 手繪模式 HUD */
        .draw-mode-hud { position: absolute; z-index: 1500; background: var(--glass-bg); backdrop-filter: var(--glass-blur); border-radius: 20px; padding: 6px; box-shadow: var(--glass-shadow); border: 1px solid var(--glass-border); display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0; visibility: hidden; pointer-events: none; transition: 0.4s; left: 20px; top: 50%; transform: translateY(-50%) translateX(-20px); }
        .draw-mode-hud.active { opacity: 1; visibility: visible; pointer-events: auto; transform: translateY(-50%) translateX(0); }

        /* 🌟 手機版樣式與橫向優化 */
        @media (max-width: 600px) { 
            :root { --panel-offset: 10px; }
            .glass-header { flex-direction: column; width: 94%; padding: 10px; gap: 8px; top: 15px;}
            .nav-buttons { width: 100%; justify-content: space-between; gap: 5px; }
            .nav-buttons button { flex: 1; padding: 8px 4px; font-size: 12px;}
            .drawer-panel { width: calc(100vw - 40px); }
            
            /* 🌟 重新設計的手機版播放器：Grid 佈局解決空間與觸控問題 */
            .global-player { 
                grid-template-columns: auto 1fr auto; 
                grid-template-areas: "play main close" "vol vol vol"; 
                gap: 8px 12px; padding: 12px 16px; width: 94%; border-radius: 20px; bottom: -300px;
                box-sizing: border-box;
            }
            .player-control-btn { grid-area: play; width: 44px; height: 44px; }
            .player-main { grid-area: main; gap: 4px; }
            .player-title { font-size: 13px; }
            .waveform-wrapper { height: 26px; }
            .close-player-btn { grid-area: close; width: 36px; height: 36px; }
            
            /* 🌟 胖手指音量槽：獨立排版、高度增加，極易操作 */
            .volume-control { grid-area: vol; width: 100%; background: rgba(0,0,0,0.05); padding: 10px 15px; border-radius: 14px; box-sizing: border-box; }
            .volume-slider { height: 30px; } /* 增加點擊範圍 */

            /* 視角校正卡片 */
            .leaflet-popup-content { width: 280px !important; }
            .sound-cover { height: 120px; }
        }

        /* 🌟 手機打橫 (Landscape) 極致優化：專業級「窄刊頭」設計 */
        @media (max-width: 950px) and (orientation: landscape) {
            .glass-header { flex-direction: row; padding: 5px 15px; top: 10px; border-radius: 12px; height: 44px; }
            .project-title { font-size: 14px; }
            .project-title span.sub-title { display: none; }
            .nav-buttons button { padding: 4px 10px; font-size: 12px; }
            .nav-buttons button svg { display: none; } /* 省下橫向空間 */
            
            .header-pull-tab { width: 80px; height: 24px; }
            .global-player.active { bottom: 10px; height: 50px; padding: 5px 15px; grid-template-areas: "play main vol close"; grid-template-columns: auto 1fr 120px auto;}
            .volume-control { display: flex; padding: 0; background: transparent; border: none; }
            .player-main { gap: 2px; }
            .waveform-wrapper { height: 18px; }
            
            #sidePanel, #routePanel { top: 65px; }
            .right-tools-wrapper { top: 65px; }
        }
    </style></head><body>

    <header class="glass-header">
        <h1 class="project-title">海佃 <span class="main-title">溪遊記</span> <span class="sub-title">聲音地景</span></h1>
        <nav class="nav-buttons">
            <button onclick="openModal('aboutModal')">關於我們</button>
            <button class="btn-latest" onclick="openModal('latestModal')">最新上架</button>
            <button class="btn-submit" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSdEq8I8O6zWZ95RO0Jf-YCKAuwUedMHsnThrU71FcTJQbuGGg/viewform', '_blank')">我要投稿</button>
        </nav>
    </header>
    
    <div id="headerPullTab" class="header-pull-tab" onclick="updateHeaderVisibility(false)">
        <div class="pull-line"></div>
        <div class="pull-text">顯示選單</div>
    </div>

    <div id="drawModeHUD" class="draw-mode-hud">
        <div id="geomanContainer" class="custom-geoman-container"></div>
        <button class="hud-close-btn" onclick="exitDrawMode()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
    </div>

    <div id="sidePanel" class="drawer-panel collapsed">
        <button class="toggle-btn" onclick="togglePanel('sidePanel', event)">
            <svg class="toggle-icon svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <div class="drawer-content">
            <div>
                <span class="panel-label">搜尋標題或採集者</span>
                <input type="text" id="searchInput" class="search-input" placeholder="輸入關鍵字..." oninput="filterMarkers()">
            </div>
            <hr style="border: 0; border-top: 1px solid #f1f5f9; margin: 0;">
            <div>
                <span class="panel-label">聲景類別篩選</span>
                <div class="filter-group">
                    <label class="filter-item"><input type="radio" name="catFilter" value="all" checked onchange="filterMarkers()"> 所有聲景</label>
                    <label class="filter-item"><input type="radio" name="catFilter" value="自然絮語" onchange="filterMarkers()"> 自然絮語</label>
                    <label class="filter-item"><input type="radio" name="catFilter" value="常民聲" onchange="filterMarkers()"> 常民聲</label>
                    <label class="filter-item"><input type="radio" name="catFilter" value="活動與產業" onchange="filterMarkers()"> 活動與產業</label>
                    <label class="filter-item"><input type="radio" name="catFilter" value="空間聲" onchange="filterMarkers()"> 空間聲</label>
                    <label class="filter-item"><input type="radio" name="catFilter" value="歲月回音" onchange="filterMarkers()"> 歲月回音</label>
                </div>
            </div>
            <div>
                <span class="panel-label">時間軸探索</span>
                <input type="range" id="timeSlider" class="time-slider" min="-1" max="23" value="-1" oninput="filterMarkers()">
                <div id="timeDisplay" class="time-display">全部時段</div>
            </div>
        </div>
    </div>

    <div id="routePanel" class="drawer-panel collapsed">
        <button class="toggle-btn" onclick="togglePanel('routePanel', event)">
            <svg class="toggle-icon svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <div class="drawer-content">
            <span class="panel-label">主題與空間走讀</span>
            <div class="route-list">
                <button class="route-btn" onclick="toggleRoute('nature', this)">綠色生態走讀</button>
                <button class="route-btn" onclick="toggleRoute('culture', this)">聚落記憶尋寶</button>
                <hr style="border: 0; border-top: 1px dashed #e2e8f0; margin: 4px 0;">
                <button class="route-btn" style="border-left: 4px solid #3498db;" onclick="toggleRoute('geofence_yanshui', this)">鹽水溪畔 200m 走讀</button>
                <button class="route-btn" style="border-left: 4px solid #3498db;" onclick="toggleRoute('geofence_jianan', this)">嘉南大圳鹽水溪排水線</button>
                <button class="route-btn" style="border-left: 4px solid #e67e22;" onclick="toggleRoute('geofence_shanhai', this)">山海圳綠道 (直達玉山)</button>
                <hr style="border: 0; border-top: 1px dashed #e2e8f0; margin: 4px 0;">
                <button class="route-btn" style="border-left: 4px solid #8e44ad;" onclick="openCustomDrawHelp()">手繪自訂走讀範圍</button>
                <button class="route-btn" onclick="toggleRoute('clear', this)" id="clearRouteBtn" style="display:none; background:#fef2f2; color:#ef4444; border-color:#fca5a5;">結束路線任務</button>
            </div>
        </div>
    </div>

    <div id="rightToolsWrapper" class="right-tools-wrapper">
        <div class="tools-toggle-btn" onclick="document.getElementById('rightToolsWrapper').classList.toggle('open')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
        </div>
        <div class="tools-menu-container">
            <div class="custom-layer-control">
                <div style="color:var(--text-muted); font-size:11px; margin-bottom:6px; font-weight:800;">現代圖資</div>
                <label><input type="radio" name="basemap" value="taiwan" checked onchange="switchBasemap(this.value)"> 🇹🇼 臺灣精細地圖</label>
                <label><input type="radio" name="basemap" value="global" onchange="switchBasemap(this.value)"> 🌍 全球通用地圖</label>
                <hr style="border: 0; border-top: 1px solid rgba(148, 163, 184, 0.3); margin: 10px 0;">
                <div style="color:var(--text-muted); font-size:11px; margin-bottom:6px; font-weight:800;">歷史套疊</div>
                <label><input type="radio" name="basemap" value="history_1904" onchange="switchBasemap(this.value)"> 📜 1904 臺灣堡圖</label>
                <label><input type="radio" name="basemap" value="history_1921" onchange="switchBasemap(this.value)"> 📜 1921 臺灣堡圖</label>
                <label><input type="radio" name="basemap" value="history_tainan" onchange="switchBasemap(this.value)"> 🗺️ 1895 臺南府迅速測圖</label>
                <div id="opacityControl" style="display:none; margin-top:8px; padding-top:8px; border-top:1px dashed rgba(148, 163, 184, 0.3);">
                    <div style="display:flex; justify-content:space-between; font-size:11px; color:#64748b; margin-bottom:4px; font-weight:700;">
                        <span>透明度</span><span id="opacityValue">80%</span>
                    </div>
                    <input type="range" id="historyOpacity" min="0" max="1" step="0.05" value="0.8" style="width:100%; accent-color:var(--accent-color);" oninput="updateOpacity(this.value)">
                </div>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div id="globalPlayer" class="global-player">
        <button id="playerToggleBtn" class="player-control-btn" onclick="toggleGlobalAudio()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        </button>
        <div class="player-main">
            <div id="playerTitleUI" class="player-title">載入中...</div>
            <div class="waveform-wrapper" id="waveformWrapper" onclick="seekGlobalAudio(event)">
                <img id="waveBase" class="wave-base" src=""><img id="waveProgress" class="wave-progress" src="">
            </div>
        </div>
        <div class="volume-control">
            <span id="muteBtn" class="mute-icon" onclick="toggleMute()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
            </span>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="1" oninput="changeVolume(this.value)">
        </div>
        <button class="close-player-btn" onclick="closeGlobalPlayer()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
    </div>

    <div id="aboutModal" class="modal-overlay" onclick="closeModalOnBgClick(event, 'aboutModal')">
        <div class="modal-box">
            <button class="modal-close-btn" onclick="closeModal('aboutModal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            <div class="modal-content">
                <h2 class="modal-title">海佃地圖 Haidian Hidden Library</h2>
                <p class="modal-text">我們將地圖的邊界從書頁延伸至真實的土地。在【海佃 溪遊記】聲音地景計畫中，帶領孩子進行一場聽覺的田野調查。</p>
            </div>
        </div>
    </div>

    <div id="latestModal" class="modal-overlay" onclick="closeModalOnBgClick(event, 'latestModal')">
        <div class="modal-box" style="max-width: 500px;">
            <div class="modal-content">
                <h2 class="modal-title">最新上架聲景 (Top 10)</h2>
                <div id="latestList" class="latest-list"></div>
            </div>
        </div>
    </div>

    <script>
        // 🌟 初始化地圖：定位至海佃國小
        var map = L.map('map', { zoomControl: false, tap: false }).setView([23.027803518305756, 120.20045732624777], 16);
        
        var globalLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO', maxZoom: 19 });
        var taiwanLayer = L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}', { attribution: '&copy; 內政部', maxZoom: 19 });
        
        var attrSinica = '&copy; 中央研究院 臺灣百年歷史地圖';
        var history1904Layer = L.tileLayer('https://gis.sinica.edu.tw/tileserver/file-exists.php?img=JM20K_1904-jpg-{z}-{x}-{y}', { attribution: attrSinica, maxZoom: 19, maxNativeZoom: 18, opacity: 0.8, keepBuffer: 4 });
        var history1921Layer = L.tileLayer('https://gis.sinica.edu.tw/tileserver/file-exists.php?img=JM20K_1921-jpg-{z}-{x}-{y}', { attribution: attrSinica, maxZoom: 19, maxNativeZoom: 18, opacity: 0.8, keepBuffer: 4 });
        var historyTainanLayer = L.tileLayer('https://gis.sinica.edu.tw/tainan/file-exists.php?img=Tainan_1896B-png-{z}-{x}-{y}', { attribution: attrSinica, maxZoom: 19, maxNativeZoom: 18, opacity: 0.8, keepBuffer: 4 });
        
        var allHistoryLayers = [history1904Layer, history1921Layer, historyTainanLayer];
        taiwanLayer.addTo(map);

        function switchBasemap(val) {
            if (map.hasLayer(globalLayer)) map.removeLayer(globalLayer);
            allHistoryLayers.forEach(l => { if (map.hasLayer(l)) map.removeLayer(l); });
            var opacityCtrl = document.getElementById('opacityControl');
            if (val === 'global') {
                if (map.hasLayer(taiwanLayer)) map.removeLayer(taiwanLayer);
                map.addLayer(globalLayer); opacityCtrl.style.display = 'none';
            } else {
                if (!map.hasLayer(taiwanLayer)) map.addLayer(taiwanLayer);
                if (val.startsWith('history')) {
                    opacityCtrl.style.display = 'block';
                    if (val === 'history_1904') map.addLayer(history1904Layer);
                    else if (val === 'history_1921') map.addLayer(history1921Layer);
                    else if (val === 'history_tainan') map.addLayer(historyTainanLayer);
                } else { opacityCtrl.style.display = 'none'; }
            }
        }

        function updateOpacity(val) {
            document.getElementById('opacityValue').innerText = Math.round(val * 100) + '%';
            allHistoryLayers.forEach(l => l.setOpacity(val));
        }

        // 🌟 核心修復：音量控制 API
        var globalAudio = new Audio();
        var lastVolume = 1;

        function changeVolume(val) {
            globalAudio.volume = val;
            lastVolume = val;
            var mb = document.getElementById('muteBtn');
            mb.innerHTML = val == 0 ? 
                `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>` : 
                `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>`;
        }

        function toggleMute() {
            if (globalAudio.volume > 0) {
                lastVolume = globalAudio.volume;
                changeVolume(0);
                document.getElementById('volumeSlider').value = 0;
            } else {
                changeVolume(lastVolume || 1);
                document.getElementById('volumeSlider').value = lastVolume || 1;
            }
        }

        // 🌟 Geoman 與自訂控制
        map.pm.addControls({ position: 'topright', drawMarker: false, drawCircle: false, drawText: false, drawRectangle: true, removalMode: true });
        map.pm.Toolbar.createCustomControl({
            name: 'clearAllBtn', block: 'edit', title: '一鍵全部清除', className: 'custom-clear-icon',
            onClick: () => { map.pm.getGeomanDrawLayers().forEach(l => map.removeLayer(l)); }
        });
        setTimeout(() => {
            var pmToolbars = document.querySelectorAll('.leaflet-pm-toolbar');
            var container = document.getElementById('geomanContainer');
            if (pmToolbars.length > 0 && container) { pmToolbars.forEach(tb => container.appendChild(tb)); }
        }, 100);

        // 智慧刊頭隱藏
        function updateHeaderVisibility(hide) {
            if (window.innerWidth <= 600) {
                var header = document.querySelector('.glass-header');
                var pullTab = document.getElementById('headerPullTab');
                if (hide) { header.classList.add('hidden-up'); pullTab.classList.add('visible'); }
                else { header.classList.remove('hidden-up'); pullTab.classList.remove('visible'); }
            }
        }
        map.on('dragstart', () => updateHeaderVisibility(true));
        map.on('popupopen', () => updateHeaderVisibility(true));

        var markerCluster = L.markerClusterGroup({ maxClusterRadius: 40, spiderfyOnMaxZoom: true });
        var allMarkersData = [], currentAudioUid = null, globalMarkerMap = {};

        fetch("https://script.google.com/macros/s/AKfycby4WSyAF4RMSahol0m5xoJ9LmIzn7JLIkdvJVOQlXvHFIzhKouqhxxDS0bGSg4oaLiVTg/exec").then(res => res.json()).then(data => { 
            allMarkersData = data; renderMarkers(data); renderLatest(data);
        });

        function createMarker(item) {
            var cardHTML = `<div class="sound-card">
                <img src="${item.coverUrl}" class="sound-cover">
                <div class="sound-info">
                    <h3 class="sound-title">${item.title}</h3>
                    <div class="card-meta-box"><span>採集者: ${item.author}</span></div>
                    <button class="btn-play-main" onclick="startGlobalPlayback('${item.uid}')">播放聲音</button>
                </div>
            </div>`;
            
            // 🌟 視角修正核心：設定 Padding，確保標記停留在播放條上方，卡片不截頂
            var pTop = window.innerWidth <= 600 ? 100 : 120;
            var pBottom = window.innerWidth <= 600 ? 180 : 120;
            var m = L.marker([item.lat, item.lon]).bindPopup(cardHTML, { autoPanPaddingTopLeft: [0, pTop], autoPanPaddingBottomRight: [0, pBottom] });
            globalMarkerMap[item.uid] = m;
            return m;
        }

        function renderMarkers(data) { markerCluster.clearLayers(); data.forEach(i => markerCluster.addLayer(createMarker(i))); map.addLayer(markerCluster); }
        function startGlobalPlayback(uid) {
            var item = allMarkersData.find(i => i.uid === uid); if (!item) return;
            currentAudioUid = uid;
            document.getElementById('playerTitleUI').innerText = item.title;
            globalAudio.src = item.audioUrl;
            globalAudio.play();
            document.getElementById('globalPlayer').classList.add('active');
            document.getElementById('playerToggleBtn').innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`;
        }

        function toggleGlobalAudio() { if (globalAudio.paused) globalAudio.play(); else globalAudio.pause(); }
        function closeGlobalPlayer() { globalAudio.pause(); document.getElementById('globalPlayer').classList.remove('active'); }
        globalAudio.onplay = () => { document.getElementById('playerToggleBtn').innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`; };
        globalAudio.onpause = () => { document.getElementById('playerToggleBtn').innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>`; };
        globalAudio.ontimeupdate = () => { if(globalAudio.duration) document.getElementById('waveProgress').style.clipPath = `inset(0 ${100-(globalAudio.currentTime/globalAudio.duration*100)}% 0 0)`; };
        
        function togglePanel(id, e) { e.stopPropagation(); document.getElementById(id).classList.toggle('collapsed'); }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function exitDrawMode() { document.getElementById('drawModeHUD').classList.remove('active'); }
        function openCustomDrawHelp() { document.getElementById('drawModeHUD').classList.add('active'); }
    </script></body></html>
