    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script>
        var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        if (isIOS) { document.documentElement.classList.add('ios-device'); }
    </script>

    <style>
        :root { 
            --panel-offset: 20px; 
            --accent-color: #27ae60; 
            --text-main: #2c3e50; 
            --text-muted: #7f8c8d;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 12px 32px rgba(15, 23, 42, 0.12);
            --glass-blur: blur(20px);
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif; background-color: #e9ecef; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        svg { flex-shrink: 0; }

        .glass-header { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 950px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-radius: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); display: flex; justify-content: space-between; align-items: center; padding: 12px 25px; z-index: 1000; border: 1px solid rgba(255,255,255,0.4); pointer-events: auto; transition: 0.4s; }
        .glass-header.hidden-up { transform: translate(-50%, -150%); opacity: 0; pointer-events: none; visibility: hidden; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease, visibility 0s 0.4s; }
        
        .header-pull-tab { position: fixed; top: 0; left: 50%; transform: translate(-50%, -100%); background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(0,0,0,0.1); border-top: none; border-radius: 0 0 16px 16px; width: 100px; height: 32px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 3px; box-shadow: 0 6px 16px rgba(0,0,0,0.15); z-index: 2000; cursor: pointer; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: auto; }
        .header-pull-tab.visible { transform: translate(-50%, 0); }
        .header-pull-tab .pull-line { width: 32px; height: 4px; background: #cbd5e1; border-radius: 2px; }

        .project-title { font-size: 18px; font-weight: 800; color: var(--text-main); margin: 0; display: flex; align-items: baseline; flex-wrap: wrap; letter-spacing: 0.5px; transition: 0.3s;}
        .project-title span.main-title { color: var(--accent-color); margin: 0 6px; }
        
        .nav-buttons { display: flex; gap: 10px; align-items: center; transition: 0.3s;}
        .nav-buttons button { background: transparent; border: none; color: #34495e; font-size: 14px; font-weight: 700; cursor: pointer; padding: 8px 14px; border-radius: 8px; transition: 0.3s; display: flex; align-items: center; gap: 6px; }
        .nav-buttons button:hover { background: rgba(39, 174, 96, 0.08); color: var(--accent-color); }
        .btn-latest { color: #d35400 !important; }
        .btn-submit { background: var(--accent-color) !important; color: white !important; box-shadow: 0 4px 12px rgba(39, 174, 96, 0.25); border-radius: 12px !important; }

        .drawer-panel { position: absolute; left: var(--panel-offset); z-index: 1001; width: 320px; box-sizing: border-box; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }
        .drawer-panel:not(.collapsed) { pointer-events: auto; }
        .drawer-panel.collapsed { transform: translateX(calc(-100% - var(--panel-offset) - 10px)); pointer-events: none;}
        .drawer-content { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; pointer-events: auto; max-height: calc(100vh - 160px); overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }

        .toggle-btn { position: absolute; right: -36px; width: 36px; height: 64px; background: rgba(255, 255, 255, 0.95); border-radius: 0 16px 16px 0; border: 1px solid rgba(255,255,255,0.5); border-left: none; cursor: pointer; display: flex; justify-content: center; align-items: center; color: var(--text-main); box-shadow: 6px 0 12px rgba(0,0,0,0.06); transition: 0.2s; z-index: 1005; pointer-events: auto;}
        #sidePanel { top: 90px; }
        #routePanel { top: 90px; } 
        #sidePanel .toggle-btn { top: 20px; }
        #routePanel .toggle-btn { top: 90px; } 

        .panel-label { font-size: 14px; font-weight: 800; color: var(--text-main); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; letter-spacing: 0.5px;}
        .search-input { width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid #dfe4ea; font-size: 14px; outline: none; box-sizing: border-box; background: #f8f9fa; }
        
        .filter-group { display: flex; flex-wrap: wrap; gap: 12px; }
        .filter-item { display: flex; align-items: center; cursor: pointer; font-size: 13px; color: var(--text-main); font-weight: 600; width: 45%; gap: 6px;}
        .filter-item input { accent-color: var(--accent-color); width: 16px; height: 16px; margin:0;}

        .route-list { display: flex; flex-direction: column; gap: 10px; }
        .route-btn { background: #f8f9fa; border: 1px solid #dfe4ea; color: var(--text-main); font-size: 13px; font-weight: 700; padding: 12px 15px; border-radius: 10px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; text-align: left; }
        .route-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }
        
        .route-path-animated { animation: dashMap 20s linear infinite; }
        @keyframes dashMap { to { stroke-dashoffset: -1000; } }

        .global-player { 
            position: fixed; bottom: -200px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 850px; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); 
            border-radius: 20px; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); 
            display: flex; align-items: center; padding: 12px 20px; gap: 16px; 
            z-index: 2000; transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.6); pointer-events: auto;
        }
        .global-player.active { bottom: 20px; } 
        
        .player-control-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent-color); color: white; border: none; cursor: pointer; flex-shrink: 0; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .player-main { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; justify-content: center;}
        .player-header-row { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 10px; overflow: hidden; }
        .player-title-container { flex: 1; overflow: hidden; white-space: nowrap; position: relative; min-width: 0; }
        .player-title { font-weight: 800; color: var(--text-main); font-size: 14px; margin: 0; white-space: nowrap; }
        
        .fav-btn { background: transparent; border: none; cursor: pointer; color: #cbd5e1; display: flex; align-items: center; justify-content: center; transition: 0.3s; padding: 4px; flex-shrink: 0; outline: none; }
        .fav-btn.active { color: #e11d48; animation: heartBurst 0.4s ease-out forwards; }
        @keyframes heartBurst { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        
        .waveform-wrapper { position: relative; width: 100%; height: 32px; border-radius: 6px; overflow: hidden; cursor: pointer; background: #f1f2f6; }
        .wave-base { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; opacity: 0.6; }
        .wave-progress { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; clip-path: inset(0 100% 0 0); }
        
        .close-player-btn { background: transparent; border: none; color: #bdc3c7; cursor: pointer; flex-shrink: 0; display: flex; justify-content: center; align-items: center; width: 32px; height: 32px; border-radius: 50%; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 2000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s ease; pointer-events: auto;}
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box { background: white; border-radius: 20px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .modal-close-btn { position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.05); color: #555; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: flex; justify-content: center; align-items: center; z-index: 10; }

        /* 🌟 SEL 徽章與作品卡片樣式 */
        .sound-card { display: flex; flex-direction: column; background: #fff; }
        .sound-cover { width: 100%; height: 160px; object-fit: cover; }
        .sound-info { padding: 16px 18px 18px 18px; }
        .sound-title { font-size: 19px; font-weight: 900; color: #1e272e; margin: 0 0 10px 0; }
        .card-meta-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px;}
        .meta-category { padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 800; background: #f1f5f9; color: #475569; border: 1px solid rgba(0,0,0,0.05); }

        .sound-desc { font-size: 13.5px; color: #475569; line-height: 1.6; margin: 0 0 12px 0; text-align: justify; max-height: 90px; overflow-y: auto; }
        .reaction-section-title { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 800; color: #64748b; background: #f1f5f9; border: 1px solid #e2e8f0; padding: 4px 10px; border-radius: 6px; margin: 6px 0 10px 0; }
        .reaction-box { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
        .reaction-btn { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 4px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 20px; cursor: pointer; color: #64748b; font-size: 11px; font-weight: 700; padding: 6px 0; flex: 1; outline: none; transition: 0.2s; }
        .reaction-btn.active[data-type="calm"] { background: #ecfdf5; color: #10b981; border-color: #a7f3d0; }
        .reaction-btn.active[data-type="surprise"] { background: #fffbeb; color: #f59e0b; border-color: #fde68a; }
        .reaction-btn.active[data-type="curious"] { background: #eff6ff; color: #3b82f6; border-color: #bfdbfe; }
        .reaction-btn.active[data-type="nostalgic"] { background: #f5f3ff; color: #8b5cf6; border-color: #ddd6fe; }
        
        .btn-play-main { background: var(--accent-color); color: #fff; border: none; padding: 12px 15px; border-radius: 10px; font-size: 14px; font-weight: 800; cursor: pointer; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px; }

        /* 🌟 右側工具列與手繪模式 HUD */
        .right-tools-wrapper { position: absolute; right: 20px; top: 90px; z-index: 1000; display: flex; flex-direction: column; align-items: flex-end; pointer-events: none; }
        .tools-toggle-btn { pointer-events: auto; width: 48px; height: 48px; background: white; border-radius: 16px; display: flex; justify-content: center; align-items: center; box-shadow: var(--glass-shadow); border: 1px solid var(--glass-border); cursor: pointer; color: var(--text-main); transition: 0.3s; margin-bottom: 12px;}
        .tools-menu-container { pointer-events: auto; display: flex; flex-direction: column; align-items: flex-end; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: 0.3s; transform-origin: top right; }
        .right-tools-wrapper.open .tools-menu-container { opacity: 1; visibility: visible; transform: translateY(0); }
        .custom-layer-control { background: white; border-radius: 16px; padding: 15px; box-shadow: var(--glass-shadow); border: 1px solid var(--glass-border); width: 220px; }
        .custom-layer-control label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; cursor: pointer; color: #34495e; font-weight: 700; font-size: 13px;}
        .draw-mode-hud { position: absolute; z-index: 1500; background: white; border-radius: 20px; padding: 6px; box-shadow: var(--glass-shadow); border: 1px solid var(--glass-border); display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0; visibility: hidden; pointer-events: none; transition: 0.4s; left: 20px; top: 50%; transform: translateY(-50%) translateX(-20px); }
        .draw-mode-hud.active { opacity: 1; visibility: visible; pointer-events: auto; transform: translateY(-50%) translateX(0); }
        .custom-geoman-container { display: flex; flex-direction: column; width: 100%; align-items: center; }
        .hud-close-btn { width: 36px; height: 36px; border-radius: 12px; background: rgba(231,76,60,0.1); color: #e74c3c; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; }

        /* 🌟 成就系統相關 CSS */
        .achievement-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); z-index: 3000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.4s; }
        .achievement-overlay.active { opacity: 1; visibility: visible; }
        .achievement-card { background: white; border-radius: 24px; padding: 40px 30px; width: 85%; max-width: 400px; text-align: center; transform: scale(0.8); transition: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .achievement-overlay.active .achievement-card { transform: scale(1); }
        .badge-icon-wrapper { width: 100px; height: 100px; margin: 0 auto 20px auto; background: linear-gradient(135deg, #fef08a 0%, #f59e0b 100%); border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 4px solid #fff; box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4); }
        .wall-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .wall-badge { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 16px 10px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px; filter: grayscale(100%); opacity: 0.5; transition: 0.3s; }
        .wall-badge.unlocked { filter: grayscale(0%); opacity: 1; border-color: #fde68a; background: #fffbeb; }
        .wall-badge-desc { font-size: 11px; color: #64748b; line-height: 1.4; margin-top: 4px; padding-top: 6px; border-top: 1px dashed #e2e8f0; }

        @media (max-width: 600px) { 
            .leaflet-popup-content-wrapper { max-height: calc(100vh - 200px); display: flex; flex-direction: column; overflow: hidden; }
            .leaflet-popup-content { width: 280px !important; max-height: calc(100vh - 200px); overflow-y: auto !important; }
            .sound-desc { max-height: none; overflow: visible; }
        }
    </style></head><body>

    <header class="glass-header">
        <h1 class="project-title">海佃 <span class="main-title">溪遊記</span></h1>
        <nav class="nav-buttons">
            <button onclick="openModal('aboutModal')"><i data-lucide="info"></i><span class="full-text">關於我們</span></button>
            <button id="navFavBtn" style="display:none;" onclick="openModal('favoritesModal')"><i data-lucide="heart" style="color:#e11d48"></i><span class="full-text">我的收藏</span></button>
            <button onclick="openModal('latestModal')"><i data-lucide="star" style="color:#d35400"></i><span class="full-text">最新上架</span></button>
            <button class="btn-submit" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSdEq8I8O6zWZ95RO0Jf-YCKAuwUedMHsnThrU71FcTJQbuGGg/viewform', '_blank')"><i data-lucide="send"></i><span>投稿</span></button>
        </nav>
    </header>

    <div id="headerPullTab" class="header-pull-tab" onclick="updateHeaderVisibility(false)">
        <div class="pull-line"></div>
    </div>

    <div id="drawModeHUD" class="draw-mode-hud">
        <div id="geomanContainer" class="custom-geoman-container"></div>
        <button class="hud-close-btn" onclick="exitDrawMode()"><i data-lucide="x"></i></button>
    </div>

    <div id="sidePanel" class="drawer-panel collapsed">
        <button class="toggle-btn" onclick="togglePanel('sidePanel')"><i data-lucide="search"></i></button>
        <div class="drawer-content">
            <span class="panel-label">搜尋標題或採集者</span>
            <input type="text" id="searchInput" class="search-input" placeholder="輸入關鍵字..." oninput="filterMarkers()">
            <hr style="border:0; border-top:1px solid #f1f5f9; margin:15px 0;">
            <span class="panel-label">聲景類別篩選</span>
            <div class="filter-group">
                <label class="filter-item"><input type="radio" name="catFilter" value="all" checked onchange="filterMarkers()"> 所有聲景</label>
                <label class="filter-item"><input type="radio" name="catFilter" value="自然絮語" onchange="filterMarkers()"> 自然絮語</label>
                <label class="filter-item"><input type="radio" name="catFilter" value="常民聲" onchange="filterMarkers()"> 常民聲</label>
                <label class="filter-item"><input type="radio" name="catFilter" value="活動與產業" onchange="filterMarkers()"> 活動與產業</label>
            </div>
            <hr style="border:0; border-top:1px solid #f1f5f9; margin:15px 0;">
            <span class="panel-label"><i data-lucide="trophy" style="color:#f59e0b"></i> 我的成就勳章</span>
            <button class="btn-more-layers" style="background:#fffbeb; color:#b45309; border:1px solid #fde68a; width:100%; padding:10px; border-radius:10px; cursor:pointer;" onclick="openModal('achievementWallModal')">點此查看成就牆</button>
        </div>
    </div>

    <div id="routePanel" class="drawer-panel collapsed">
        <button class="toggle-btn" onclick="togglePanel('routePanel')"><i data-lucide="map"></i></button>
        <div class="drawer-content">
            <span class="panel-label">主題走讀路線</span>
            <div class="route-list">
                <button class="route-btn" onclick="toggleRoute('nature', this)"><i data-lucide="leaf"></i> 生態走讀</button>
                <button class="route-btn" onclick="toggleRoute('culture', this)"><i data-lucide="home"></i> 聚落走讀</button>
                <button class="route-btn" onclick="openCustomDrawHelp()"><i data-lucide="pen-tool"></i> 手繪自訂範圍</button>
            </div>
        </div>
    </div>

    <div id="rightToolsWrapper" class="right-tools-wrapper">
        <div class="tools-toggle-btn" onclick="document.getElementById('rightToolsWrapper').classList.toggle('open')"><i data-lucide="layers"></i></div>
        <div class="tools-menu-container">
            <div class="custom-layer-control">
                <label><input type="radio" name="basemap" value="taiwan" checked onchange="switchBasemap(this.value)"> 臺灣精細地圖</label>
                <label><input type="radio" name="basemap" value="esri_sat" onchange="switchBasemap(this.value)"> 衛星影像</label>
                <hr>
                <label><input type="radio" name="basemap" value="history_1904" onchange="switchBasemap(this.value)"> 1904 臺灣堡圖</label>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div id="badgeUnlockModal" class="achievement-overlay" onclick="closeModal('badgeUnlockModal')">
        <div class="achievement-card">
            <div class="badge-icon-wrapper" id="unlockedBadgeIcon"></div>
            <h2 class="achievement-title" id="unlockedBadgeName">成就解鎖！</h2>
            <p class="achievement-desc" id="unlockedBadgeDesc"></p>
            <button class="btn-claim-badge" onclick="closeModal('badgeUnlockModal')">收下徽章繼續探索</button>
        </div>
    </div>

    <div id="achievementWallModal" class="modal-overlay" onclick="closeModalOnBgClick(event, 'achievementWallModal')">
        <div class="modal-box" style="max-width:450px; padding:30px;">
            <button class="modal-close-btn" onclick="closeModal('achievementWallModal')"><i data-lucide="x"></i></button>
            <h2 style="text-align:center;"><i data-lucide="award" style="color:#f59e0b"></i> 聲音獵人成就牆</h2>
            <div id="achievementWallGrid" class="wall-grid"></div>
        </div>
    </div>

    <div id="globalPlayer" class="global-player">
        <button id="playerToggleBtn" class="player-control-btn" onclick="toggleGlobalAudio()"><i data-lucide="play" fill="white"></i></button>
        <div class="player-main">
            <div class="player-header-row">
                <div id="playerTitleContainer" class="player-title-container"><div id="playerTitleUI" class="player-title">載入中...</div></div>
                <button id="favBtn" class="fav-btn" onclick="toggleFavorite()"><i data-lucide="heart"></i></button>
                <div id="playerTimeDisplay" style="font-size:11px;">00:00 / 00:00</div>
            </div>
            <div class="waveform-wrapper" id="waveformWrapper" onclick="seekGlobalAudio(event)">
                <img id="waveBase" class="wave-base" src=""><img id="waveProgress" class="wave-progress" src="">
            </div>
        </div>
        <button class="close-player-btn" onclick="closeGlobalPlayer()"><i data-lucide="x"></i></button>
    </div>

    <script>
        // ==========================================
        // 核心配置
        // ==========================================
        const API_URL = "https://haidian-soundscape-default-rtdb.asia-southeast1.firebasedatabase.app/soundscape_data.json";
        const MISSION_URL = "https://haidian-soundscape-default-rtdb.asia-southeast1.firebasedatabase.app/quest_config.json";
        
        var map = L.map('map', { zoomControl: false, tap: false }).setView([23.0278, 120.2004], 15);
        var taiwanLayer = L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}', { maxZoom: 19 }).addTo(map);
        var esriSatLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });
        var history1904Layer = L.tileLayer('https://gis.sinica.edu.tw/tileserver/file-exists.php?img=JM20K_1904-jpg-{z}-{x}-{y}', { maxZoom: 19, opacity: 0.8 });

        var markerCluster = L.markerClusterGroup({ maxClusterRadius: 40 });
        var allMarkersData = [], globalAudio = new Audio(), currentAudioUid = null, globalMarkerMap = {};
        var userFavorites = new Set(), userReactions = {}, unlockedBadges = new Set(), cloudQuests = [];

        // Firebase 初始化
        const firebaseConfig = {
            apiKey: "AIzaSyBXGNMbKedaTF2XjePRpFhNIv3NwRrmo_U",
            authDomain: "haidian-soundscape.firebaseapp.com",
            projectId: "haidian-soundscape",
            storageBucket: "haidian-soundscape.firebasestorage.app",
            messagingSenderId: "116926349938",
            appId: "1:116926349938:web:5ace762dab874d323f78eb"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 🌟 登入與資料連動
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('navFavBtn').style.display = 'flex';
                updateAuthUI(user);
                // 抓取收藏
                db.collection("user_favorites").where("userId", "==", user.uid).get().then(qs => {
                    userFavorites.clear(); qs.forEach(doc => userFavorites.add(doc.data().soundUid));
                });
                // 抓取情緒
                db.collection("user_reactions").where("userId", "==", user.uid).get().then(qs => {
                    userReactions = {}; qs.forEach(doc => { userReactions[doc.data().soundUid] = doc.data().reactionType; });
                });
                // 抓取成就
                db.collection("user_achievements").doc(user.uid).get().then(doc => {
                    if (doc.exists) unlockedBadges = new Set(doc.data().badges);
                    renderAchievementWall();
                });
            } else {
                updateAuthUI(null);
            }
        });

        // 🌟 載入任務清單
        function fetchMissionConfig() {
            fetch(MISSION_URL).then(res => res.json()).then(data => {
                cloudQuests = data || [];
                renderAchievementWall();
            });
        }

        // 🌟 成就檢查核心
        window.checkAchievements = function() {
            if (!auth.currentUser) return;
            let interactedUids = new Set([...userFavorites, ...Object.keys(userReactions)]);
            let newBadges = [];

            cloudQuests.forEach(quest => {
                if (unlockedBadges.has(quest.id)) return;
                let count = 0;
                interactedUids.forEach(uid => {
                    let item = allMarkersData.find(i => i.uid === uid);
                    if (item && (quest.param === 'all' || item.category.includes(quest.param) || item.title.includes(quest.param))) {
                        count++;
                    }
                });
                if (count >= parseInt(quest.goal)) newBadges.push(quest);
            });

            if (newBadges.length > 0) {
                newBadges.forEach(q => unlockedBadges.add(q.id));
                db.collection("user_achievements").doc(auth.currentUser.uid).set({ badges: Array.from(unlockedBadges) }, { merge: true });
                showUnlockAnimation(newBadges[newBadges.length - 1]);
                renderAchievementWall();
            }
        };

        function showUnlockAnimation(quest) {
            document.getElementById('unlockedBadgeIcon').innerHTML = `<i data-lucide="${quest.icon || 'award'}"></i>`;
            document.getElementById('unlockedBadgeName').innerText = quest.name;
            document.getElementById('unlockedBadgeDesc').innerText = quest.desc;
            lucide.createIcons();
            document.getElementById('badgeUnlockModal').classList.add('active');
        }

        function renderAchievementWall() {
            let grid = document.getElementById('achievementWallGrid');
            if(!grid) return; grid.innerHTML = '';
            cloudQuests.forEach(quest => {
                let isUnlocked = unlockedBadges.has(quest.id);
                grid.innerHTML += `<div class="wall-badge ${isUnlocked ? 'unlocked' : ''}">
                    <div class="mini-icon"><i data-lucide="${quest.icon || 'award'}"></i></div>
                    <div class="wall-badge-name">${quest.name}</div>
                    <div style="font-size:10px;font-weight:800;">${isUnlocked ? '🔓 已達成' : '🔒 未解鎖'}</div>
                    <div class="wall-badge-desc">${quest.desc}</div>
                </div>`;
            });
            lucide.createIcons();
        }

        // 🌟 地圖功能
        function createMarker(item) {
            var cardHTML = `<div class="sound-card">
                <img src="${item.coverUrl}" class="sound-cover">
                <div class="sound-info">
                    <h3 class="sound-title">${item.title}</h3>
                    <div class="card-meta-box"><span>採集者: ${item.author}</span><span class="meta-category">${item.category}</span></div>
                    <div class="sound-desc">${item.description}</div>
                    <div class="reaction-section-title">留下你的聽覺回音...</div>
                    <div class="reaction-box">
                        <button class="reaction-btn" data-type="calm" onclick="toggleReaction('${item.uid}', 'calm')"><i data-lucide="wind"></i></button>
                        <button class="reaction-btn" data-type="surprise" onclick="toggleReaction('${item.uid}', 'surprise')"><i data-lucide="zap"></i></button>
                        <button class="reaction-btn" data-type="curious" onclick="toggleReaction('${item.uid}', 'curious')"><i data-lucide="search"></i></button>
                        <button class="reaction-btn" data-type="nostalgic" onclick="toggleReaction('${item.uid}', 'nostalgic')"><i data-lucide="history"></i></button>
                    </div>
                    <button class="btn-play-main" id="card-btn-${item.uid}" onclick="toggleCardPlay(event, '${item.uid}')">播放聲音</button>
                </div>
            </div>`;
            var marker = L.marker([item.lat, item.lon]).bindPopup(cardHTML, { autoPan: false });
            globalMarkerMap[item.uid] = marker;
            return marker;
        }

        function renderMarkers(data) {
            markerCluster.clearLayers();
            data.forEach(item => markerCluster.addLayer(createMarker(item)));
            map.addLayer(markerCluster);
            lucide.createIcons();
        }

        function filterMarkers() {
            var s = document.getElementById('searchInput').value.toLowerCase();
            var cat = document.querySelector('input[name="catFilter"]:checked').value;
            renderMarkers(allMarkersData.filter(i => (cat === 'all' || i.category.includes(cat)) && (i.title.toLowerCase().includes(s) || i.author.toLowerCase().includes(s))));
        }

        function switchBasemap(val) {
            [taiwanLayer, esriSatLayer, history1904Layer].forEach(l => map.removeLayer(l));
            if (val === 'esri_sat') esriSatLayer.addTo(map);
            else if (val === 'history_1904') { taiwanLayer.addTo(map); history1904Layer.addTo(map); }
            else taiwanLayer.addTo(map);
        }

        // 🌟 播放與交互攔截
        window.toggleReaction = function(uid, type) {
            if (!auth.currentUser) return alert("🔒 請先登入探險！");
            userReactions[uid] = (userReactions[uid] === type) ? null : type;
            db.collection("user_reactions").doc(auth.currentUser.uid + "_" + uid).set({ soundUid: uid, reactionType: type, userId: auth.currentUser.uid });
            updateReactionUI(uid);
            setTimeout(checkAchievements, 800);
        };

        window.toggleFavorite = function(targetUid) {
            let uid = targetUid || currentAudioUid;
            if (!uid || !auth.currentUser) return alert("🔒 請先登入探險！");
            if (userFavorites.has(uid)) userFavorites.delete(uid); else userFavorites.add(uid);
            db.collection("user_favorites").doc(auth.currentUser.uid + "_" + uid).set({ soundUid: uid, userId: auth.currentUser.uid });
            setTimeout(checkAchievements, 800);
        };

        function startGlobalPlayback(uid) {
            var item = allMarkersData.find(i => i.uid === uid); if(!item) return;
            currentAudioUid = uid;
            document.getElementById('playerTitleUI').innerText = item.title;
            document.getElementById('globalPlayer').classList.add('active');
            globalAudio.src = item.audioUrl; globalAudio.play();
            lucide.createIcons();
        }

        // UI 連動與工具
        function openModal(id) { document.getElementById(id).classList.add('active'); if(id==='achievementWallModal') checkAchievements(); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function closeModalOnBgClick(e, id) { if (e.target.id === id) closeModal(id); }
        function togglePanel(id) { document.getElementById(id).classList.toggle('collapsed'); }
        function updateAuthUI(user) { /* 實作登入登出按鈕切換 */ }

        // 初始化
        fetch(API_URL).then(res => res.json()).then(data => { allMarkersData = data; renderMarkers(data); });
        fetchMissionConfig();
        lucide.createIcons();
        map.on('popupopen', function(e) { forceFocusMarker(e.popup._source); lucide.createIcons(); });
    </script>
</body></html>
