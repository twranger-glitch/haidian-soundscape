<!DOCTYPE html><html lang="zh-TW"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>海佃溪遊記 | 聲音地景計畫</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.15.0/dist/leaflet-geoman.css" />
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.15.0/dist/leaflet-geoman.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        if (isIOS) { document.documentElement.classList.add('ios-device'); }
    </script>

    <style>
        :root { 
            --panel-offset: 20px; 
            --accent-color: #27ae60; 
            --text-main: #2c3e50; 
            --text-muted: #7f8c8d;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 12px 32px rgba(15, 23, 42, 0.12);
            --glass-blur: blur(20px);
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif; background-color: #e9ecef; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        svg { flex-shrink: 0; }

        .glass-header { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 950px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-radius: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); display: flex; justify-content: space-between; align-items: center; padding: 12px 25px; z-index: 1000; border: 1px solid rgba(255,255,255,0.4); pointer-events: auto; transition: 0.4s; }
        .glass-header.hidden-up { transform: translate(-50%, -150%); opacity: 0; pointer-events: none; visibility: hidden; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease, visibility 0s 0.4s; }
        
        .nav-buttons button .short-text { display: none; }
        @media (min-width: 601px) {
            .glass-header.compact-mode { width: auto; left: 20px; top: 20px; transform: translateX(0); padding: 10px 18px; border-radius: 16px; }
            .glass-header.compact-mode .project-title span.sub-title { display: inline-block; font-size: 12px; margin-left: 6px; }
            .glass-header.compact-mode .nav-buttons button .full-text { display: none; }
            .glass-header.compact-mode .nav-buttons button .short-text { display: inline; }
        }

        .header-pull-tab { position: fixed; top: 0; left: 50%; transform: translate(-50%, -100%); background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(0,0,0,0.1); border-top: none; border-radius: 0 0 16px 16px; width: 100px; height: 32px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 3px; box-shadow: 0 6px 16px rgba(0,0,0,0.15); z-index: 2000; cursor: pointer; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: auto; }
        .header-pull-tab.visible { transform: translate(-50%, 0); }
        .header-pull-tab .pull-line { width: 32px; height: 4px; background: #cbd5e1; border-radius: 2px; }
        .header-pull-tab .pull-text { font-size: 10px; font-weight: 800; color: #64748b; letter-spacing: 1px; line-height: 1; }

        .project-title { font-size: 18px; font-weight: 800; color: var(--text-main); margin: 0; display: flex; align-items: baseline; flex-wrap: wrap; letter-spacing: 0.5px; transition: 0.3s;}
        .project-title span.main-title { color: var(--accent-color); margin: 0 6px; }
        .project-title span.sub-title { font-size: 13px; color: var(--text-muted); font-weight: 600; margin-left: 5px; transition: 0.3s;}
        
        .nav-buttons { display: flex; gap: 10px; align-items: center; transition: 0.3s;}
        .nav-buttons button { background: transparent; border: none; color: #34495e; font-size: 14px; font-weight: 700; cursor: pointer; padding: 8px 14px; border-radius: 8px; transition: 0.3s; display: flex; align-items: center; gap: 6px; }
        .nav-buttons button:hover { background: rgba(39, 174, 96, 0.08); color: var(--accent-color); }
        .btn-latest { color: #d35400 !important; }
        .btn-latest:hover { background: rgba(211, 84, 0, 0.08) !important; }
        .btn-submit { background: var(--accent-color) !important; color: white !important; box-shadow: 0 4px 12px rgba(39, 174, 96, 0.25); border-radius: 12px !important; }
        .btn-submit:hover { background: #219150 !important; box-shadow: 0 6px 15px rgba(39, 174, 96, 0.35); }

        .drawer-panel { position: absolute; left: var(--panel-offset); z-index: 1001; width: 320px; box-sizing: border-box; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }
        .drawer-panel:not(.collapsed) { pointer-events: auto; }
        .drawer-panel.collapsed { transform: translateX(calc(-100% - var(--panel-offset) - 10px)); pointer-events: none;}
        
        .drawer-content { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; pointer-events: auto; max-height: calc(100vh - 160px); overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }

        .toggle-btn { position: absolute; right: -36px; width: 36px; height: 64px; background: rgba(255, 255, 255, 0.95); border-radius: 0 16px 16px 0; border: 1px solid rgba(255,255,255,0.5); border-left: none; cursor: pointer; display: flex; justify-content: center; align-items: center; color: var(--text-main); box-shadow: 6px 0 12px rgba(0,0,0,0.06); transition: 0.2s; z-index: 1005; pointer-events: auto;}
        .toggle-btn:hover { color: var(--accent-color); background: #fff; }

        #sidePanel { top: 90px; }
        #routePanel { top: 90px; } 
        #sidePanel .toggle-btn { top: 20px; }
        #routePanel .toggle-btn { top: 90px; } 
        
        .toggle-icon { width: 20px; height: 20px; transition: transform 0.4s; stroke-width: 2.5;}
        .drawer-panel.collapsed .toggle-icon.svg-icon { transform: rotate(180deg); }

        .panel-label { font-size: 14px; font-weight: 800; color: var(--text-main); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; letter-spacing: 0.5px;}
        .panel-label svg { color: var(--text-muted); }
        .search-input { width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid #dfe4ea; font-size: 14px; outline: none; box-sizing: border-box; background: #f8f9fa; transition: 0.2s;}
        .search-input:focus { background: #fff; border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.15); }
        
        .filter-group { display: flex; flex-wrap: wrap; gap: 12px; }
        .filter-item { display: flex; align-items: center; cursor: pointer; font-size: 13px; color: var(--text-main); font-weight: 600; width: 45%; gap: 6px;}
        .filter-item input { accent-color: var(--accent-color); width: 16px; height: 16px; margin:0;}

        .time-slider { width: 100%; accent-color: var(--accent-color); cursor: pointer; margin: 10px 0; }
        .time-display { font-size: 13px; font-weight: 700; color: var(--accent-color); text-align: center; background: rgba(39, 174, 96, 0.08); padding: 8px; border-radius: 8px; letter-spacing: 0.5px;}

        .route-list { display: flex; flex-direction: column; gap: 10px; }
        .route-btn { background: #f8f9fa; border: 1px solid #dfe4ea; color: var(--text-main); font-size: 13px; font-weight: 700; padding: 12px 15px; border-radius: 10px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; text-align: left; }
        .route-btn svg { width: 18px; height: 18px; color: var(--text-muted); transition: 0.2s;}
        .route-btn:hover { background: #fff; border-color: #bdc3c7; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .route-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); box-shadow: 0 4px 12px rgba(39,174,96,0.25);}
        .route-btn.active svg { color: white; }
        
        .route-path-animated { animation: dashMap 20s linear infinite; }
        @keyframes dashMap { to { stroke-dashoffset: -1000; } }

        .global-player { 
            position: fixed; bottom: -200px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 850px; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); 
            border-radius: 20px; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); 
            display: flex; align-items: center; padding: 12px 20px; gap: 16px; 
            z-index: 2000; transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.6); pointer-events: auto;
        }
        .global-player.active { bottom: 20px; } 
        
        .player-control-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent-color); color: white; border: none; cursor: pointer; flex-shrink: 0; display: flex; justify-content: center; align-items: center; transition: 0.2s; box-shadow: 0 4px 10px rgba(39,174,96,0.3);}
        .player-control-btn:hover { transform: scale(1.05); background: #219150;}
        .player-control-btn:active { transform: scale(0.95); }
        
        .player-main { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; justify-content: center;}
        
        .player-header-row { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 10px; overflow: hidden; }
        
        .player-title-container { 
            flex: 1; overflow: hidden; white-space: nowrap; position: relative; min-width: 0;
            -webkit-mask-image: linear-gradient(90deg, #000 0%, #000 90%, transparent 100%);
            mask-image: linear-gradient(90deg, #000 0%, #000 90%, transparent 100%);
        }
        
        .player-title { display: inline-block; font-weight: 800; color: var(--text-main); font-size: 14px; margin: 0; white-space: nowrap; will-change: transform; }
        .player-title.marquee-text { display: inline-flex; padding-left: 0; animation: marquee-anim 12s linear infinite; }
        @keyframes marquee-anim { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        
        .player-time-display { font-size: 11px; font-family: 'Courier New', Courier, monospace; color: var(--text-muted); font-weight: 800; flex-shrink: 0; background: rgba(15, 23, 42, 0.05); padding: 2px 6px; border-radius: 6px;}
        
        .fav-btn {
            background: transparent; border: none; cursor: pointer; color: #cbd5e1;
            display: flex; align-items: center; justify-content: center; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 4px; flex-shrink: 0; outline: none;
        }
        .fav-btn:hover { color: #f43f5e; transform: scale(1.15); }
        .fav-btn:active { transform: scale(0.9); }
        .fav-btn.active { color: #e11d48; animation: heartBurst 0.4s ease-out forwards; }
        .fav-btn.active svg { fill: #e11d48; }
        
        @keyframes heartBurst {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        .waveform-wrapper { position: relative; width: 100%; height: 32px; border-radius: 6px; overflow: hidden; cursor: pointer; background: #f1f2f6; }
        .wave-base { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; opacity: 0.6; }
        .wave-progress { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; clip-path: inset(0 100% 0 0); }
        
        .volume-control { display: flex; align-items: center; gap: 8px; color: var(--text-muted); width: 130px; flex-shrink: 0;}
        .volume-slider { width: 100%; accent-color: var(--accent-color); cursor: pointer; height: 4px; }
        
        .mute-icon { cursor: pointer; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; transition: 0.2s; flex-shrink: 0;}
        .mute-icon:hover { color: var(--text-main); }
        
        .close-player-btn { background: transparent; border: none; color: #bdc3c7; cursor: pointer; flex-shrink: 0; display: flex; justify-content: center; align-items: center; width: 32px; height: 32px; border-radius: 50%; transition: 0.2s;}
        .close-player-btn:hover { background: #f1f2f6; color: #e74c3c;}

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 2000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s ease; pointer-events: auto;}
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box { background: white; border-radius: 20px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.2); pointer-events: auto; overscroll-behavior: contain;}
        .modal-close-btn { position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.05); color: #555; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: flex; justify-content: center; align-items: center; z-index: 10; transition: 0.2s;}
        .modal-close-btn:hover { background: #e74c3c; color: white;}
        .modal-img { width: 100%; height: 220px; object-fit: cover; border-radius: 20px 20px 0 0;}
        .modal-content { padding: 30px; text-align: justify; }
        .modal-title { font-size: 22px; color: var(--text-main); margin: 0 0 8px 0; font-weight: 800; line-height: 1.3; display: flex; align-items: center; gap: 8px;}
        .modal-tag { display: inline-block; background: #f1f5f9; color: #475569; padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 700; margin-bottom: 20px; border: 1px solid #e2e8f0; letter-spacing: 0.5px;}
        
        .quote-block { margin-top: 24px; padding: 20px; background: #f8fafc; border-left: 4px solid var(--accent-color); border-radius: 0 12px 12px 0; }

        /* 🌟 防爆內部滾動條與文字排版設定 */
        .sound-desc { 
            font-size: 13.5px; color: #475569; line-height: 1.6; 
            margin: 0 0 12px 0; text-align: justify;
            max-height: 90px; overflow-y: auto; padding-right: 6px;
            scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent;
        }
        .sound-desc::-webkit-scrollbar { width: 4px; }
        .sound-desc::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .modal-text { font-size: 15px; color: #475569; line-height: 1.7; margin: 0 0 16px 0; }
        
        .latest-list { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        
        /* 🌟 SEL 聽覺回音引導標籤 樣式 */
        .reaction-section-title {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 800; color: #64748b;
            background: #f1f5f9; border: 1px solid #e2e8f0;
            padding: 4px 10px; border-radius: 6px;
            margin: 6px 0 10px 0; letter-spacing: 0.5px;
        }
        .reaction-section-title svg { color: #94a3b8; }
        
        /* 🌟 SEL 高級質感膠囊情緒徽章 樣式 */
        .reaction-box { 
            display: flex; justify-content: space-between; gap: 8px; margin-bottom: 12px;
        }
        .reaction-btn { 
            display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 4px; 
            background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 20px; 
            cursor: pointer; color: #64748b; 
            transition: all 0.2s ease; 
            font-size: 11px; font-weight: 700; padding: 6px 0; flex: 1;
            outline: none;
        }
        .reaction-btn svg { width: 14px; height: 14px; transition: all 0.2s ease; }
        .reaction-btn:hover { background: #e2e8f0; color: #475569; transform: translateY(-1px); }
        .reaction-btn:active { transform: scale(0.95); }
        
        /* 啟用狀態：精美柔和透明漸層 */
        .reaction-btn.active { transform: translateY(-1px); border-color: transparent; }
        .reaction-btn.active[data-type="calm"] { background: #ecfdf5; color: #10b981; border-color: #a7f3d0; box-shadow: 0 2px 6px rgba(16,185,129,0.15); }
        .reaction-btn.active[data-type="surprise"] { background: #fffbeb; color: #f59e0b; border-color: #fde68a; box-shadow: 0 2px 6px rgba(245,158,11,0.15); }
        .reaction-btn.active[data-type="curious"] { background: #eff6ff; color: #3b82f6; border-color: #bfdbfe; box-shadow: 0 2px 6px rgba(59,130,246,0.15); }
        .reaction-btn.active[data-type="nostalgic"] { background: #f5f3ff; color: #8b5cf6; border-color: #ddd6fe; box-shadow: 0 2px 6px rgba(139,92,246,0.15); }

        /* 🌟 成就系統與徽章動畫 樣式 */
        .achievement-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 3000; display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .achievement-overlay.active { opacity: 1; visibility: visible; }
        
        .achievement-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border-radius: 24px; padding: 40px 30px; width: 85%; max-width: 400px;
            text-align: center; position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.8);
            transform: scale(0.8) translateY(20px); transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .achievement-overlay.active .achievement-card { transform: scale(1) translateY(0); }
        
        .badge-icon-wrapper {
            width: 100px; height: 100px; margin: 0 auto 20px auto;
            background: linear-gradient(135deg, #fef08a 0%, #f59e0b 100%);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4), inset 0 2px 4px rgba(255,255,255,0.6);
            border: 4px solid #fff; position: relative;
            animation: badgeFloat 3s ease-in-out infinite;
        }
        .badge-icon-wrapper i { width: 50px; height: 50px; color: #fff; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); display: flex; justify-content: center; align-items: center; }
        
        /* 閃耀光芒特效 */
        .badge-icon-wrapper::before {
            content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%; background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.8), transparent);
            animation: badgeShine 4s linear infinite; z-index: -1; opacity: 0.6;
        }

        @keyframes badgeFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes badgeShine { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .achievement-title { font-size: 24px; font-weight: 900; color: #1e293b; margin: 0 0 8px 0; letter-spacing: 1px;}
        .achievement-desc { font-size: 14px; color: #64748b; line-height: 1.6; margin: 0 0 24px 0;}
        
        .btn-claim-badge {
            background: #1e293b; color: white; border: none; padding: 12px 24px; border-radius: 12px;
            font-size: 15px; font-weight: 800; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 12px rgba(30, 41, 59, 0.2); width: 100%;
        }
        .btn-claim-badge:hover { background: #334155; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(30, 41, 59, 0.3); }

        /* 側邊欄成就牆樣式 */
        .wall-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .wall-badge {
            background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 16px 10px;
            display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px;
            filter: grayscale(100%); opacity: 0.5; transition: 0.3s;
        }
        .wall-badge.unlocked { filter: grayscale(0%); opacity: 1; border-color: #fde68a; background: #fffbeb; box-shadow: 0 4px 12px rgba(245,158,11,0.1); }
        .wall-badge .mini-icon { width: 40px; height: 40px; border-radius: 50%; background: #e2e8f0; display: flex; justify-content: center; align-items: center; }
        .wall-badge.unlocked .mini-icon { background: linear-gradient(135deg, #fef08a 0%, #f59e0b 100%); }
        .wall-badge.unlocked .mini-icon i { color: white; width: 22px; height: 22px; }
        .wall-badge-name { font-size: 12px; font-weight: 800; color: #475569; }
        .wall-badge.unlocked .wall-badge-name { color: #b45309; }
        .wall-badge-desc { font-size: 11px; color: #64748b; line-height: 1.4; margin-top: 4px; padding-top: 6px; border-top: 1px dashed #e2e8f0; }

        .latest-item { display: flex; gap: 16px; background: #fff; padding: 12px; border-radius: 12px; cursor: pointer; border: 1px solid #e2e8f0; transition: all 0.2s ease; align-items: center;}
        .latest-item:hover { border-color: #cbd5e1; transform: translateY(-2px); box-shadow: 0 8px 16px rgba(0,0,0,0.06); }
        .latest-item img { width: 64px; height: 64px; border-radius: 8px; object-fit: cover; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1);}
        .latest-item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 8px; }

    <script>
        // ==========================================
        // 核心配置與備援系統
        // ==========================================
        const MISSION_MODE = 'remote'; // 💡 切換成 'local' 可立刻回到原始穩定版
        
        // 原始備援任務 (如果雲端抓不到，就用這個)
        const LOCAL_QUESTS = [
            { id: 'q_eco', name: '生態傾聽者', desc: '聽完 3 個「自然絮語」或「空間聲」類別的聲音。', type: 'reaction', param: '自然', goal: 3, icon: 'leaf' },
            { id: 'q_village', name: '聚落尋跡人', desc: '聽完 5 個「常民聲」或「活動與產業」類別的聲音。', type: 'reaction', param: '常民', goal: 5, icon: 'home' },
            { id: 'q_voyager', name: '台江時空旅人', desc: '收集超過 10 個聲音，且包含至少 1 個「歲月回音」。', type: 'favorite', param: '歲月', goal: 10, icon: 'timer' }
        ];

        let cloudQuests = [];
        let unlockedBadges = new Set();
        let userFavorites = new Set();
        let userReactions = {};

        // 初始化地圖
        var map = L.map('map', { zoomControl: false, tap: false }).setView([23.0278, 120.2004], 15);
        var taiwanLayer = L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}', { attribution: '&copy; 內政部', maxZoom: 19 }).addTo(map);
        var markerCluster = L.markerClusterGroup({ maxClusterRadius: 40 });
        var allMarkersData = [], globalAudio = new Audio(), currentAudioUid = null, globalMarkerMap = {};

        // ==========================================
        // Firebase 與 任務同步
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBXGNMbKedaTF2XjePRpFhNIv3NwRrmo_U",
            authDomain: "haidian-soundscape.firebaseapp.com",
            projectId: "haidian-soundscape",
            storageBucket: "haidian-soundscape.firebasestorage.app",
            messagingSenderId: "116926349938",
            appId: "1:116926349938:web:5ace762dab874d323f78eb"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 抓取任務清單
        function fetchMissionConfig() {
            if (MISSION_MODE === 'local') {
                cloudQuests = LOCAL_QUESTS;
                renderAchievementWall();
                return;
            }
            // 從 Firebase 讀取試算表同步過來的 JSON
            fetch("https://haidian-soundscape-default-rtdb.asia-southeast1.firebasedatabase.app/quest_config.json")
                .then(res => res.json())
                .then(data => {
                    cloudQuests = data || LOCAL_QUESTS;
                    renderAchievementWall();
                }).catch(() => {
                    cloudQuests = LOCAL_QUESTS;
                    renderAchievementWall();
                });
        }

        // ==========================================
        // 成就與互動邏輯
        // ==========================================
        window.checkAchievements = function() {
            if (!auth.currentUser) return;
            let interactedUids = new Set([...userFavorites, ...Object.keys(userReactions)]);
            
            let newBadges = [];
            cloudQuests.forEach(quest => {
                if (unlockedBadges.has(quest.id)) return;
                
                let count = 0;
                let pool = quest.type === 'favorite' ? userFavorites : (quest.type === 'upload' ? new Set() : interactedUids);
                
                pool.forEach(uid => {
                    let item = allMarkersData.find(i => i.uid === uid);
                    if (item && (quest.param === 'all' || item.category.includes(quest.param) || item.title.includes(quest.param))) {
                        count++;
                    }
                });

                if (count >= parseInt(quest.goal)) {
                    newBadges.push(quest);
                }
            });

            if (newBadges.length > 0) {
                newBadges.forEach(q => unlockedBadges.add(q.id));
                db.collection("user_achievements").doc(auth.currentUser.uid).set({ badges: Array.from(unlockedBadges) }, { merge: true });
                showUnlockAnimation(newBadges[newBadges.length - 1]);
                renderAchievementWall();
            }
        };

        function showUnlockAnimation(quest) {
            document.getElementById('unlockedBadgeIcon').innerHTML = `<i data-lucide="${quest.icon || 'award'}"></i>`;
            document.getElementById('unlockedBadgeName').innerText = quest.name;
            document.getElementById('unlockedBadgeDesc').innerText = quest.desc;
            lucide.createIcons();
            document.getElementById('badgeUnlockModal').classList.add('active');
        }

        function renderAchievementWall() {
            let grid = document.getElementById('achievementWallGrid');
            if(!grid) return;
            grid.innerHTML = '';
            cloudQuests.forEach(quest => {
                let isUnlocked = unlockedBadges.has(quest.id);
                grid.innerHTML += `
                    <div class="wall-badge ${isUnlocked ? 'unlocked' : ''}">
                        <div class="mini-icon"><i data-lucide="${quest.icon || 'award'}"></i></div>
                        <div class="wall-badge-name">${quest.name}</div>
                        <div style="font-size:10px;font-weight:800;">${isUnlocked ? '🔓 已達成' : '🔒 未解鎖'}</div>
                        <div class="wall-badge-desc">${quest.desc}</div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        // ==========================================
        // 核心地圖功能
        // ==========================================
        function startGlobalPlayback(uid) {
            var item = allMarkersData.find(i => i.uid === uid);
            if (!item) return;
            currentAudioUid = uid;
            document.getElementById('globalPlayer').classList.add('active');
            document.getElementById('playerTitleUI').innerText = item.title;
            globalAudio.src = item.audioUrl;
            globalAudio.play();
            updateCardButtonUI();
            lucide.createIcons();
        }

        function createMarker(item) {
            var cardHTML = `
                <div class="sound-card">
                    <img src="${item.coverUrl}" class="sound-cover">
                    <div class="sound-info">
                        <h3 class="sound-title">${item.title}</h3>
                        <div class="card-meta-box">

                        </div>
                        <div class="sound-desc">${item.description}</div>
                        <div class="reaction-section-title"><i data-lucide="message-square"></i> 留下你的聽覺回音...</div>
                        <div class="reaction-box">
                            <button class="reaction-btn" data-type="calm" onclick="toggleReaction('${item.uid}', 'calm')"><i data-lucide="wind"></i>平靜</button>
                            <button class="reaction-btn" data-type="surprise" onclick="toggleReaction('${item.uid}', 'surprise')"><i data-lucide="zap"></i>驚喜</button>
                            <button class="reaction-btn" data-type="curious" onclick="toggleReaction('${item.uid}', 'curious')"><i data-lucide="search"></i>好奇</button>
                            <button class="reaction-btn" data-type="nostalgic" onclick="toggleReaction('${item.uid}', 'nostalgic')"><i data-lucide="history"></i>懷念</button>
                        </div>
                        <button class="btn-play-main" id="card-btn-${item.uid}" onclick="toggleCardPlay(event, '${item.uid}')">播放聲音</button>
                    </div>
                </div>`;
            var marker = L.marker([item.lat, item.lon]).bindPopup(cardHTML, { autoPan: false });
            globalMarkerMap[item.uid] = marker;
            return marker;
        }

        function renderMarkers(data) {
            markerCluster.clearLayers();
            data.forEach(item => markerCluster.addLayer(createMarker(item)));
            map.addLayer(markerCluster);
            lucide.createIcons();
        }

        // ==========================================
        // 互動與同步攔截器
        // ==========================================
        window.toggleReaction = function(uid, type) {
            if (!auth.currentUser) return alert("🔒 請先登入探險！");
            let isSame = userReactions[uid] === type;
            if (isSame) delete userReactions[uid]; else userReactions[uid] = type;
            db.collection("user_reactions").doc(auth.currentUser.uid + "_" + uid).set({ soundUid: uid, reactionType: type, userId: auth.currentUser.uid });
            updateReactionUI(uid);
            setTimeout(checkAchievements, 800);
        };

        window.toggleFavorite = function(targetUid) {
            let uid = targetUid || currentAudioUid;
            if (!uid || !auth.currentUser) return alert("🔒 請先登入探險！");
            if (userFavorites.has(uid)) userFavorites.delete(uid); else userFavorites.add(uid);
            updateFavoriteUI();
            setTimeout(checkAchievements, 800);
        };

        window.updateReactionUI = function(uid) {
            let bar = document.getElementById('reaction-bar-' + uid);
            if (!bar) return;
            let selectedType = userReactions[uid];
            bar.querySelectorAll('.reaction-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.type === selectedType);
            });
        };

        // 初始化
        fetchMissionConfig();
        lucide.createIcons();

        // 載入聲音資料
        fetch(API_URL).then(res => res.json()).then(data => { allMarkersData = data; renderMarkers(data); });

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('navFavBtn').style.display = 'flex';
                // 抓取已解鎖徽章
                db.collection("user_achievements").doc(user.uid).get().then(doc => {
                    if (doc.exists) unlockedBadges = new Set(doc.data().badges);
                    renderAchievementWall();
                });
            }
        });

        // 通用 Modal 控制
        function openModal(id) { document.getElementById(id).classList.add('active'); if(id==='achievementWallModal') checkAchievements(); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function closeModalOnBgClick(e, id) { if(e.target.id === id) closeModal(id); }
        function togglePanel(id) { document.getElementById(id).classList.toggle('collapsed'); }

    </script>
</body></html>
